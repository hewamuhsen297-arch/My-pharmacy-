    </div>

    <div id="invoice" class="print-only text-right p-6" style="width: 80mm; margin: auto;">

            <h1 class="text-xl font-black">سەیدەلیەی ڕۆژیار</h1>
            <p class="text-[10px]">بەحرکە - جوت سایدی گشتی - مزگەوتی مەلا ڕەشید</p>

            <div class="border-b border-dashed my-2"></div>
        </div>

            <tbody id="invBody"></tbody>

    <script>
        const PASSWORDS = { admin: "1998", staff: "2000" };
        let inventory = [];
        let cart = [];
        let html5QrCode;

        function handleLogin() {
            const role = document.getElementById('userRole').value;
            const pass = document.getElementById('passField').value;
            if(pass === PASSWORDS[role]) {
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                if(role === 'admin') document.getElementById('adminStats').classList.remove('hidden');
                loadData();
            } else { alert("ڕەمز هەڵەیە!"); }
        }

        async function loadData() {
            const { data } = await supabaseClient.from('inventory').select('*');
            if(data) { inventory = data; updateUI(); }
        }

        async function saveToStock() {
            const item = {
                barcode: document.getElementById('stBarcode').value,
                name: document.getElementById('stName').value,
                type: document.getElementById('stType').value,
                pack_price: Number(document.getElementById('stPackPrice').value),
                strips_per_pack: Number(document.getElementById('stStrips').value) || 1,
                total_strips: Number(document.getElementById('stQty').value) * (Number(document.getElementById('stStrips').value) || 1),
                expiry_date: document.getElementById('stExp').value,
                invoice_name: document.getElementById('invName').value
            };
            const { error } = await supabaseClient.from('inventory').insert([item]);
            if(!error) { alert("تۆمار کرا"); loadData(); }
        }

        function updateUI() {
            const select = document.getElementById('sellSelect');
            select.innerHTML = "";
            inventory.forEach(item => {

                const
