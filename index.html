<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سیستەمی پێشکەوتووی سەیدەلیە</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 font-sans">

    <div id="loginPage" class="fixed inset-0 bg-slate-900 flex items-center justify-center z-[100]">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-80 text-center border-t-8 border-blue-600">
            <div class="bg-blue-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-user-shield text-3xl text-blue-600"></i>
            </div>
            <h2 class="text-xl font-bold mb-6 text-gray-800">بەڕێوبەری دەرمانخانە</h2>
            <input id="adminPass" type="password" placeholder="ڕەمزی نهێنی" class="w-full border p-3 rounded-2xl mb-4 text-center outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50">
            <button onclick="checkLogin()" class="w-full bg-blue-600 text-white py-3 rounded-2xl font-bold hover:bg-blue-700 transition shadow-lg">چوونەژوورەوە</button>
            <p id="loginError" class="text-red-500 mt-3 text-sm hidden font-bold">ڕەمزەکە هەڵەیە!</p>
        </div>
    </div>

    <div id="mainDashboard" class="hidden">
        <nav class="bg-blue-700 text-white p-4 shadow-xl flex justify-between items-center sticky top-0 z-50">
            <div class="flex items-center gap-2">
                <i class="fas fa-file-invoice-dollar text-2xl"></i>
                <h1 class="font-bold text-lg">سیستەمی فرۆشتن و کۆگا</h1>
            </div>
            <button onclick="location.reload()" class="bg-red-500 px-4 py-1 rounded-xl text-sm font-bold shadow-md">دەرچوون</button>
        </nav>

        <div class="container mx-auto p-4 md:p-6 space-y-6">
            
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="bg-white p-4 rounded-2xl shadow-sm border-b-4 border-blue-500 text-center">
                    <p class="text-xs text-gray-500 mb-1 font-bold text-blue-600">فرۆشی ئەمڕۆ</p>
                    <h3 id="todayTotal" class="text-xl font-black">0 د.ع</h3>
                </div>
                <div class="bg-white p-4 rounded-2xl shadow-sm border-b-4 border-green-500 text-center">
                    <p class="text-xs text-gray-500 mb-1 font-bold text-green-600">ژمارەی فرۆش</p>
                    <h3 id="salesCount" class="text-xl font-black">0</h3>
                </div>
                <div class="bg-white p-4 rounded-2xl shadow-sm border-b-4 border-purple-500 text-center">
                    <p class="text-xs text-gray-500 mb-1 font-bold text-purple-600">دەرمان لە کۆگا</p>
                    <h3 id="stockCount" class="text-xl font-black">0</h3>
                </div>
                <button onclick="printReport()" class="bg-slate-800 text-white p-4 rounded-2xl shadow-lg flex flex-col items-center justify-center hover:bg-slate-700 transition">
                    <i class="fas fa-print mb-1"></i>
                    <span class="text-xs font-bold">چاپی ڕاپۆرت</span>
                </button>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                    <h2 class="font-bold mb-4 text-blue-800 flex items-center gap-2 border-b pb-2">
                        <i class="fas fa-cart-shopping"></i> فرۆشتنی دەرمان
                    </h2>
                    <div class="space-y-4">
                        <div class="relative">
                            <input id="sellBarcode" type="text" placeholder="بارکۆد سکان بکە..." class="w-full border-2 p-4 rounded-2xl bg-gray-50 focus:border-blue-500 outline-none pr-12 text-lg">
                            <i class="fas fa-barcode absolute right-4 top-5 text-gray-400 text-xl"></i>
                        </div>
                        <div class="flex gap-2">
                            <input id="sellQty" type="number" value="1" min="1" class="w-24 border-2 p-3 rounded-2xl text-center font-bold">
                            <button onclick="processSale()" class="flex-1 bg-green-600 text-white py-4 rounded-2xl font-black hover:bg-green-700 shadow-lg transition transform active:scale-95">
                                <i class="fas fa-check-circle ml-2"></i> جێبەجێکردن
                            </button>
                        </div>
                    </div>
                    
                    <div class="mt-6">
                        <p class="text-sm font-bold text-gray-400 mb-2">دوایین پسوولەکان:</p>
                        <div id="recentSales" class="space-y-2 text-sm max-h-40 overflow-y-auto">
                            <p class="text-gray-400 italic">هێشتا هیچ فرۆشتنێک نییە</p>
                        </div>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 h-fit">
                    <h2 class="font-bold mb-4 text-blue-800 flex items-center gap-2 border-b pb-2">
                        <i class="fas fa-box-open"></i> داخڵکردنی دەرمانی نوێ
                    </h2>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="col-span-2">
                            <input id="newName" type="text" placeholder="ناوی دەرمان" class="w-full border p-3 rounded-xl bg-gray-50 outline-none focus:border-blue-500">
                        </div>
                        <input id="newPrice" type="number" placeholder="نرخی فرۆشتن" class="w-full border p-3 rounded-xl bg-gray-50 outline-none focus:border-blue-500">
                        <input id="newQty" type="number" placeholder="بڕی سەرەتایی" class="w-full border p-3 rounded-xl bg-gray-50 outline-none focus:border-blue-500">
                        <div class="col-span-2 relative">
                            <input id="newBarcode" type="text" placeholder="بارکۆد" class="w-full border p-3 rounded-xl bg-gray-50 outline-none focus:border-blue-500 pr-10">
                            <i class="fas fa-tag absolute right-3 top-4 text-gray-400"></i>
                        </div>
                        <button onclick="addToStock()" class="col-span-2 bg-blue-600 text-white py-3 rounded-xl font-bold shadow-md hover:bg-blue-700 transition">تۆمارکردن لە سیستەم</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const MY_PASS = "1998"; // ڕەمزی نهێنی خۆت
        let salesData = [];
        let stockCount = 0;
        let dailyTotal = 0;

        function checkLogin() {
            const val = document.getElementById('adminPass').value;
            if(val === MY_PASS) {
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('mainDashboard').classList.remove('hidden');
            } else {
                const err = document.getElementById('loginError');
                err.classList.remove('hidden');
                setTimeout(() => err.classList.add('hidden'), 2000);
            }
        }

        function processSale() {
            const barcode = document.getElementById('sellBarcode').value;
            const qty = document.getElementById('sellQty').value;
            if(!barcode) return alert("تکایە بارکۆد سکان بکە");

            // لێرە تەنها وەک نموونە داتایەک زیاد دەکەین
            const now = new Date().toLocaleTimeString('ku-IQ');
            const newSale = `<div class="flex justify-between bg-green-50 p-2 rounded-lg border-r-4 border-green-500">
                <span>بارکۆد: ${barcode} (x${qty})</span>
                <span class="font-bold">${now}</span>
            </div>`;
            
            const recentDiv = document.getElementById('recentSales');
            if(salesData.length === 0) recentDiv.innerHTML = "";
            recentDiv.insertAdjacentHTML('afterbegin', newSale);
            
            salesData.push({barcode, qty});
            dailyTotal += 5000 * qty; // بۆ نموونە هەر دەرمانێک ٥٠٠٠
            
            document.getElementById('todayTotal').innerText = dailyTotal.toLocaleString() + " د.ع";
            document.getElementById('salesCount').innerText = salesData.length;
            document.getElementById('sellBarcode').value = "";
        }

        function addToStock() {
            const name = document.getElementById('newName').value;
            if(!name) return alert("ناوی دەرمان بنوسە");
            stockCount++;
            document.getElementById('stockCount').innerText = stockCount;
            alert("دەرمانەکە بە سەرکەوتوویی لە کۆگا زیاد کرا");
            // پاککردنەوەی خانەکان
            document.getElementById('newName').value = "";
            document.getElementById('newPrice').value = "";
            document.getElementById('newBarcode').value = "";
        }

        function printReport() {
            let reportContent = "ڕاپۆرتی فرۆشتنی ئەمڕۆ:\n\n";
            reportContent += "کۆی فرۆشتن: " + dailyTotal + " دینار\n";
            reportContent += "ژمارەی دەرمانە فرۆشراوەکان: " + salesData.length + "\n";
            alert(reportContent + "\nئەم بەشە دەتوانرێت ببەسترێتەوە بە چاپکەر (Printer)");
        }
    </script>
</body>
</html>
