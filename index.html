<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سەیدەلیەی ڕۆژیار - بەحرکە</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans Arabic', sans-serif; }
    </style>
</head>
<body class="bg-slate-50">

    <script>
        // Firebase Config - بە زانیارییە نوێیەکانی تۆ
        const firebaseConfig = {
            apiKey: "AIzaSyArrrDsEpvnQhi3SFsEcQagVdlBbXMuqVE",
            authDomain: "rozhyar--pharmacy.firebaseapp.com",
            projectId: "rozhyar--pharmacy",
            storageBucket: "rozhyar--pharmacy.firebasestorage.app",
            messagingSenderId: "641814773252",
            appId: "1:641814773252:web:7a12ac6ded015ced5a7f51",
            measurementId: "G-2BL63CLH46"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
    </script>

    <div id="loginPage" class="fixed inset-0 bg-slate-900 flex items-center justify-center z-[100] px-4">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm text-center border-t-8 border-blue-600">
            <h1 class="text-3xl font-black text-blue-600 mb-2 font-bold">سەیدەلیەی ڕۆژیار</h1>
            <p class="text-sm text-gray-500 mb-8 font-bold text-center">بەحرکە - نزیک مزگەوتی مەلا ڕەشید</p>
            <div class="space-y-4">
                <select id="userRole" class="w-full border-2 border-gray-100 p-4 rounded-2xl bg-gray-50 font-bold outline-none text-right">
                    <option value="admin">بەڕێوبەر (Admin)</option>
                    <option value="staff">کارمەند (Staff)</option>
                </select>
                <input id="passField" type="password" placeholder="ڕەمزی نهێنی" class="w-full border-2 border-gray-100 p-4 rounded-2xl text-center outline-none focus:border-blue-500 font-bold">
                <button onclick="handleLogin()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black shadow-lg hover:bg-blue-700 transition-all text-lg">چوونەژوورەوە</button>
            </div>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <nav class="bg-blue-900 text-white p-4 flex justify-between items-center shadow-xl">
             <h1 class="text-xl font-black">کۆگای ڕۆژیار</h1>
             <button onclick="location.reload()" class="bg-red-500 px-4 py-2 rounded-xl text-xs font-bold font-bold">دەرچوون</button>
        </nav>
        <div class="p-10 text-center font-bold text-xl">
            <div class="bg-green-100 text-green-700 p-4 rounded-2xl mb-5 font-bold">بەستنەوە بە Firebase سەرکەوتوو بوو! ✅</div>
            <p>ئێستا دەتوانیت دەست بکەیت بە بەڕێوبەرایەتی کۆگا.</p>
        </div>
    </div>

    <script>
        const PASSWORDS = { admin: "1998", staff: "2000" };

        function handleLogin() {
            const role = document.getElementById('userRole').value;
            const pass = document.getElementById('passField').value;
            
            if(pass === PASSWORDS[role]) {
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('mainApp').classList.remove('hidden');
            } else {
                alert("ڕەمزەکە هەڵەیە!");
            }
        }
    </script>
</body>
</html>
