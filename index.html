<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سیستەمی دەرمانخانە - ڕاپۆرتی گشتی</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @media print {
            .no-print { display: none !important; }
            .print-area { display: block !important; width: 100%; }
            body { background-color: white; }
            .card { border: 1px solid #ddd !important; box-shadow: none !important; }
        }
        .print-area { display: none; }
    </style>
</head>
<body class="bg-slate-50 font-sans">

    <div id="loginPage" class="fixed inset-0 bg-slate-900 flex items-center justify-center z-[100] no-print">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-80 text-center border-t-8 border-blue-600">
            <h2 class="text-xl font-bold mb-6">چوونەژوورەوە</h2>
            <input id="adminPass" type="password" placeholder="ڕەمزی نهێنی" class="w-full border p-3 rounded-2xl mb-4 text-center outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50">
            <button onclick="checkLogin()" class="w-full bg-blue-600 text-white py-3 rounded-2xl font-bold shadow-lg">چوونەژوورەوە</button>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <nav class="bg-blue-800 text-white p-4 shadow-lg flex justify-between items-center no-print">
            <h1 class="font-bold"><i class="fas fa-pills ml-2"></i>کۆگای دەرمانخانە</h1>
            <div class="flex gap-2">
                <button onclick="printStock()" class="bg-slate-700 px-4 py-2 rounded-xl text-sm font-bold hover:bg-slate-600">
                    <i class="fas fa-print ml-1"></i> چاپی کۆگا
                </button>
                <button onclick="location.reload()" class="bg-red-500 px-4 py-2 rounded-xl text-sm font-bold">دەرچوون</button>
            </div>
        </nav>

        <div class="container mx-auto p-4 md:p-6 space-y-6 no-print">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                    <h2 class="font-bold mb-4 text-blue-800 border-b pb-2">زیادکردن بۆ کۆگا</h2>
                    <div class="grid grid-cols-1 gap-3">
                        <input id="stockName" type="text" placeholder="ناوی دەرمان" class="p-3 border rounded-xl">
                        <div class="grid grid-cols-2 gap-2">
                            <input id="stockPrice" type="number" placeholder="نرخی فرۆشتن" class="p-3 border rounded-xl">
                            <input id="stockExpiry" type="date" class="p-3 border rounded-xl">
                        </div>
                        <button onclick="saveToStock()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold shadow-md hover:bg-blue-700">پاشەکەوت کردن</button>
                    </div>
                </div>

                <div class="bg-white rounded-3xl shadow-sm border overflow-hidden">
                    <div class="bg-slate-50 p-4 border-b font-bold text-slate-700">بینینی کۆگا (ئێستا)</div>
                    <div class="max-h-60 overflow-y-auto">
                        <table class="w-full text-right text-sm">
                            <thead class="bg-gray-100">
                                <tr><th class="p-3">دەرمان</th><th class="p-3">نرخ</th><th class="p-3">بەسەرچوون</th></tr>
                            </thead>
                            <tbody id="inventoryTable"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div class="print-area p-8 text-right">
            <div class="flex justify-between items-center border-b-4 border-blue-600 pb-4 mb-6">
                <div>
                    <h1 class="text-3xl font-black text-blue-800">ڕاپۆرتی گشتی کۆگا</h1>
                    <p id="printDate" class="text-gray-500 mt-1"></p>
                </div>
                <div class="text-left font-bold text-gray-400 italic">Pharmacy System v1.0</div>
            </div>
            
            <table class="w-full border-collapse">
                <thead>
                    <tr class="bg-blue-600 text-white">
                        <th class="p-3 border border-blue-700 text-right">ناوی دەرمان</th>
                        <th class="p-3 border border-blue-700 text-center">نرخی فرۆشتن</th>
                        <th class="p-3 border border-blue-700 text-center">بەرواری بەسەرچوون</th>
                    </tr>
                </thead>
                <tbody id="printTableBody"></tbody>
            </table>
            <div class="mt-8 text-left text-sm text-gray-400">واژۆی بەڕێوبەر: __________________</div>
        </div>
    </div>

    <script>
        const MY_PASS = "1998";
        let mainStock = [];

        function checkLogin() {
            if(document.getElementById('adminPass').value === MY_PASS) {
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('mainApp').classList.remove('hidden');
            }
        }

        function saveToStock() {
            const name = document.getElementById('stockName').value;
            const price = document.getElementById('stockPrice').value;
            const expiry = document.getElementById('stockExpiry').value;

            if(!name || !price || !expiry) return alert("تکایە هەموو خانەکان پڕ بکەرەوە");

            const item = { name, price, expiry };
            mainStock.push(item);
            
            // زیادکردن بۆ خشتەی سەر شاشە
            const row = `<tr class="border-b">
                <td class="p-3 font-bold">${name}</td>
                <td class="p-3 text-center">${Number(price).toLocaleString()} د.ع</td>
                <td class="p-3 text-center ${isExpired(expiry) ? 'text-red-600 font-bold' : ''}">${expiry}</td>
            </tr>`;
            document.getElementById('inventoryTable').insertAdjacentHTML('afterbegin', row);

            alert("تۆمار کرا");
            document.getElementById('stockName').value = "";
        }

        function isExpired(date) {
            const exp = new Date(date);
            const today = new Date();
            const diff = (exp.getFullYear() - today.getFullYear()) * 12 + (exp.getMonth() - today.getMonth());
            return diff <= 3;
        }

        function printStock() {
            if(mainStock.length === 0) return alert("هیچ دەرمانێک نییە لە کۆگا بۆ چاپکردن");
            
            const printBody = document.getElementById('printTableBody');
            printBody.innerHTML = "";
            document.getElementById('printDate').innerText = "بەرواری چاپکردن: " + new Date().toLocaleDateString('ku-IQ');

            mainStock.forEach(item => {
                const row = `<tr class="border-b">
                    <td class="p-3 border font-bold">${item.name}</td>
                    <td class="p-3 border text-center">${Number(item.price).toLocaleString()} د.ع</td>
                    <td class="p-3 border text-center">${item.expiry}</td>
                </tr>`;
                printBody.innerHTML += row;
            });

            window.print();
        }
    </script>
</body>
</html>
