<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ڕۆژیار PRO - کۆگا و فرۆشتنی بەستراو</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700;900&display=swap');
        :root { --main-color: #2563eb; }
        body { font-family: 'Noto Sans Arabic', sans-serif; background-color: #f8fafc; padding-bottom: 90px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-btn.active { color: var(--main-color); transform: scale(1.1); }
        .bg-main { background-color: var(--main-color) !important; }
        .text-main { color: var(--main-color) !important; }
        .border-main { border-color: var(--main-color) !important; }
        #reader { border-radius: 20px; overflow: hidden; }
        @media print { body * { visibility: hidden; } #receiptPrint, #receiptPrint * { visibility: visible; } #receiptPrint { position: absolute; left: 0; top: 0; width: 100%; text-align: center; } }
    </style>
</head>
<body>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyArrrDsEpvnQhi3SFsEcQagVdlBbXMuqVE",
            authDomain: "rozhyar--pharmacy.firebaseapp.com",
            projectId: "rozhyar--pharmacy",
            storageBucket: "rozhyar--pharmacy.firebasestorage.app",
            messagingSenderId: "641814773252",
            appId: "1:641814773252:web:7a12ac6ded015ced5a7f51",
            measurementId: "G-2BL63CLH46"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
    </script>

    <div id="loginPage" class="fixed inset-0 bg-slate-900 flex items-center justify-center z-[100] px-4">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-sm text-center border-t-8 border-main">
            <h1 class="text-3xl font-black text-main mb-6">ڕۆژیار PRO</h1>
            <input id="passField" type="password" placeholder="ڕەمزی چوونەژوورەوە" class="w-full border-2 p-4 rounded-2xl text-center mb-4 outline-none font-bold bg-gray-50 focus:border-main">
            <button onclick="handleLogin()" class="w-full bg-main text-white py-4 rounded-2xl font-black text-xl shadow-lg">چوونەژوورەوە</button>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-4 z-50 rounded-t-[2.5rem] shadow-xl">
            <button onclick="switchTab('inventory')" id="btn-inventory" class="nav-btn active flex flex-col items-center">
                <i class="fas fa-boxes text-2xl"></i><span class="text-[10px] font-black mt-1">کۆگا</span>
            </button>
            <button onclick="switchTab('sales')" id="btn-sales" class="nav-btn flex flex-col items-center text-gray-400">
                <i class="fas fa-cash-register text-2xl"></i><span class="text-[10px] font-black mt-1">فرۆشتن</span>
            </button>
            <button id="nav-report" onclick="switchTab('report')" class="nav-btn flex flex-col items-center text-gray-400">
                <i class="fas fa-chart-line text-2xl"></i><span class="text-[10px] font-black mt-1">ڕاپۆرت</span>
            </button>
            <button id="nav-settings" onclick="switchTab('settings')" class="nav-btn flex flex-col items-center text-gray-400">
                <i class="fas fa-cog text-2xl"></i><span class="text-[10px] font-black mt-1">ڕێکخستن</span>
            </button>
        </nav>

        <div id="inventoryTab" class="tab-content active p-4 max-w-2xl mx-auto space-y-4">
            <div class="bg-main flex justify-between items-center p-5 rounded-[2rem] text-white shadow-lg">
                <h2 class="font-black">بەڕێوەبردنی کۆگا</h2>
                <button onclick="startScanner('inv')" class="bg-white/20 p-3 rounded-2xl"><i class="fas fa-barcode text-xl"></i></button>
            </div>

            <div id="scannerUI" class="hidden rounded-3xl border-4 border-main overflow-hidden h-64 bg-black relative">
                <div id="reader"></div>
                <button onclick="stopScanner()" class="absolute top-2 right-2 bg-red-600 text-white w-10 h-10 rounded-full z-10 font-bold">X</button>
            </div>

            <div class="bg-white p-6 rounded-[2rem] shadow-sm border space-y-3">
                <input id="mBarcode" type="text" placeholder="بارکۆدی دەرمان" class="w-full p-3 bg-gray-50 border rounded-xl outline-none font-bold">
                <input id="mName" type="text" placeholder="ناوی دەرمان" class="w-full p-3 bg-gray-50 border rounded-xl outline-none font-bold">
                
                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-gray-400 mr-2">نرخی فرۆشتنی کارتۆن</label>
                        <input id="mPrice" type="number" class="w-full p-3 bg-gray-50 border rounded-xl text-center font-bold">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-gray-400 mr-2">چەند شیت لە کارتۆنێکدایە؟</label>
                        <input id="mStrips" type="number" value="1" class="w-full p-3 bg-gray-50 border rounded-xl text-center font-bold">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <input id="mQty" type="number" placeholder="بڕ (ژمارەی کارتۆن)" class="p-3 bg-gray-50 border rounded-xl text-center font-bold">
                    <select id="mType" class="p-3 bg-gray-50 border rounded-xl outline-none text-main font-bold">
                        <option value="تابلێت">Tablet</option><option value="کەپسول">Capsule</option><option value="شیر">Milk</option>
                        <option value="مەرهەم">Ointment</option><option value="بتڵ">Bottle</option>
                    </select>
                </div>
                <button onclick="addMedicine()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-black shadow-md">تۆمارکردن لە کۆگا</button>
            </div>

            <input type="text" id="searchInput" onkeyup="searchMedicine('inv')" placeholder="بگەڕێ لە کۆگا..." class="w-full p-4 rounded-2xl border outline-none font-bold text-right bg-white shadow-sm focus:border-main">
            <div id="medicineList" class="space-y-3"></div>
        </div>

        <div id="salesTab" class="tab-content p-4 max-w-2xl mx-auto space-y-4">
            <div class="bg-white p-6 rounded-[2rem] shadow-sm border space-y-3">
                <div class="flex gap-2">
                    <input type="text" id="salesSearchInput" onkeyup="searchMedicine('sales')" placeholder="ناوی دەرمان یان بارکۆد..." class="flex-1 p-4 bg-gray-50 border rounded-2xl outline-none text-right font-bold focus:border-main">
                    <button onclick="startScanner('sales')" class="bg-main text-white px-5 rounded-2xl shadow-md"><i class="fas fa-camera text-xl"></i></button>
                </div>
                <div id="salesSearchResults" class="space-y-2 max-h-60 overflow-y-auto"></div>
            </div>

            <div class="bg-white p-6 rounded-[2rem] shadow-sm border space-y-4">
                <h3 class="font-black text-main border-b pb-2">سەبەتەی فرۆشتن</h3>
                <div id="cartList" class="space-y-2 min-h-[100px]"></div>
                
                <div class="bg-blue-50 p-5 rounded-2xl space-y-3">
                    <input id="customerName" type="text" placeholder="ناوی کڕیار (بۆ حاڵەتی قەرز)" class="w-full p-3 bg-white border rounded-xl outline-none font-bold">
                    <div class="flex gap-6 font-bold text-sm">
                        <label class="flex items-center gap-2 cursor-pointer"><input type="radio" name="payType" value="cash" checked class="w-4 h-4"> نەقد</label>
                        <label class="flex items-center gap-2 cursor-pointer"><input type="radio" name="payType" value="debt" class="w-4 h-4"> قەرز</label>
                    </div>
                </div>

                <div class="flex justify-between items-center px-2">
                    <span class="font-black text-gray-500">کۆی گشتی:</span>
                    <span id="cartTotal" class="font-black text-3xl text-main">0</span>
                </div>
                <button onclick="checkout()" class="w-full bg-main text-white py-5 rounded-2xl font-black text-xl shadow-lg active:scale-95 transition-all">بڕینی وەسڵ و کەمکردن لە کۆگا</button>
            </div>
        </div>

        <div id="reportTab" class="tab-content p-4 max-w-2xl mx-auto space-y-4">
            <input type="date" id="reportDate" onchange="loadReport()" class="w-full p-4 rounded-2xl border outline-none font-bold shadow-sm">
            <div id="dailySummary" class="bg-slate-800 text-white p-8 rounded-[2.5rem] text-center shadow-xl"></div>
            <div id="allSalesList" class="bg-white p-6 rounded-[2rem] shadow-sm space-y-3"></div>
        </div>

        <div id="settingsTab" class="tab-content p-4 max-w-2xl mx-auto space-y-4">
            <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border text-center space-y-6">
                <h2 class="font-black text-main text-xl">ڕێکخستنەکان</h2>
                <div>
                    <p class="font-bold mb-3 text-gray-500">گۆڕینی ڕەنگی سیستم</p>
                    <div class="flex justify-center gap-4">
                        <button onclick="changeColor('#2563eb')" class="w-12 h-12 rounded-full bg-[#2563eb] border-4 border-white shadow-md"></button>
                        <button onclick="changeColor('#16a34a')" class="w-12 h-12 rounded-full bg-[#16a34a] border-4 border-white shadow-md"></button>
                        <button onclick="changeColor('#dc2626')" class="w-12 h-12 rounded-full bg-[#dc2626] border-4 border-white shadow-md"></button>
                        <button onclick="changeColor('#9333ea')" class="w-12 h-12 rounded-full bg-[#9333ea] border-4 border-white shadow-md"></button>
                    </div>
                </div>
                <button onclick="location.reload()" class="w-full bg-gray-100 text-gray-600 py-4 rounded-2xl font-bold">دەرچوون (Logout)</button>
            </div>
        </div>
    </div>

    <div id="receiptPrint" class="hidden text-center" style="direction: rtl; padding: 20px;">
        <h2 style="font-size: 22px; margin: 0;">سەیدەلیەی ڕۆژیار</h2>
        <p style="font-size: 11px; margin: 5px 0;">بەروار: <span id="rDate"></span></p>
        <div style="border-top: 1px dashed #000; margin: 10px 0;"></div>
        <div id="rItems" style="text-align: right; font-size: 14px;"></div>
        <div style="border-top: 1px dashed #000; margin: 10px 0;"></div>
        <h3 style="font-size: 18px;">کۆی گشتی: <span id="rTotal"></span> د.ع</h3>
        <p style="font-size: 12px; margin-top: 10px;">هیوای چاکبوونەوەت بۆ دەخوازین</p>
    </div>

    <script>
        let allMedicines = []; let cart = []; let html5QrCode;
        let adminPass = localStorage.getItem('adminPass') || "1998";
        let staffPass = localStorage.getItem('staffPass') || "1111";
        let mainColor = localStorage.getItem('mainColor') || "#2563eb";

        function applyTheme() { document.documentElement.style.setProperty('--main-color', mainColor); }
        applyTheme();

        function handleLogin() {
            const p = document.getElementById('passField').value;
            if(p === adminPass) startApp("admin");
            else if(p === staffPass) startApp("staff");
            else alert("ڕەمز هەڵەیە!");
        }

        function startApp(role) {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            if(role === "staff") {
                document.getElementById('nav-report').style.display = 'none';
                document.getElementById('nav-settings').style.display = 'none';
            }
            loadData();
        }

        function switchTab(t) {
            document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(x => { x.classList.add('text-gray-400'); x.classList.remove('active'); });
            document.getElementById(t + 'Tab').classList.add('active');
            document.getElementById('btn-' + t).classList.add('active');
            document.getElementById('btn-' + t).classList.remove('text-gray-400');
            stopScanner();
        }

        // --- SCANNER ---
        function startScanner(target) {
            document.getElementById('scannerUI').classList.remove('hidden');
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (text) => {
                stopScanner();
                const item = allMedicines.find(m => m.barcode === text);
                if(item) {
                    if(target === 'sales') { addToCart(item.id, item.name, item.price, item.qty, item.strips); switchTab('sales'); }
                    else document.getElementById('mBarcode').value = text;
                } else {
                    if(target === 'inv') document.getElementById('mBarcode').value = text;
                    else alert("ئەم بارکۆدە تۆمار نەکراوە!");
                }
            });
        }
        function stopScanner() { if(html5QrCode) html5QrCode.stop().then(()=>document.getElementById('scannerUI').classList.add('hidden')).catch(e=>{}); }

        // --- CORE FUNCTIONS ---
        async function addMedicine() {
            const b = document.getElementById('mBarcode').value, n = document.getElementById('mName').value;
            const p = parseFloat(document.getElementById('mPrice').value), q = parseFloat(document.getElementById('mQty').value);
            const s = parseInt(document.getElementById('mStrips').value) || 1;
            if(!n || !p || isNaN(q)) return alert("تکایە زانیارییەکان تەواو بکە");
            await db.collection("inventory").add({ barcode: b, name: n, price: p, qty: q, strips: s, type: document.getElementById('mType').value });
            document.querySelectorAll('#inventoryTab input').forEach(i => i.value = "");
            alert("سەرکەوتووانە تۆمارکرا ✅");
        }

        function loadData() {
            db.collection("inventory").orderBy("name").onSnapshot(snap => {
                allMedicines = []; snap.forEach(doc => allMedicines.push({id: doc.id, ...doc.data()}));
                renderInventory(allMedicines);
            });
        }

        function renderInventory(data) {
            const div = document.getElementById('medicineList'); div.innerHTML = "";
            data.forEach(item => {
                const totalStrips = (item.qty * item.strips).toFixed(1);
                div.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl shadow-sm border-r-8 ${item.qty <= 2 ? 'border-red-500':'border-main'} flex justify-between items-center">
                        <div>
                            <div class="font-black text-slate-800">${item.name}</div>
                            <div class="text-[10px] font-bold text-gray-400">کۆگا: ${item.qty.toFixed(1)} کارتۆن (${totalStrips} شیت)</div>
                            <div class="text-[10px] text-main font-bold">نرخ: ${item.price.toLocaleString()}</div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="addToCart('${item.id}','${item.name}',${item.price},${item.qty},${item.strips})" class="bg-main text-white p-3 rounded-xl shadow-md"><i class="fas fa-plus"></i></button>
                            <button onclick="deleteMedicine('${item.id}')" class="text-red-300 p-2"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>`;
            });
        }

        async function deleteMedicine(id) { if(confirm("دڵنیای لە سڕینەوە؟")) await db.collection("inventory").doc(id).delete(); }

        function addToCart(id, name, price, stock, stripsPerBox) {
            if(stock <= 0) return alert("ئەم دەرمانە لە کۆگا تەواو بووە!");
            const stripPrice = Math.round(price / stripsPerBox);
            cart.push({ id, name, boxPrice: price, stripPrice: stripPrice, mode: 'box', stripsPerBox });
            updateCartUI();
        }

        function updateCartUI() {
            const div = document.getElementById('cartList'); div.innerHTML = ""; let total = 0;
            cart.forEach((item, idx) => {
                const currentPrice = item.mode === 'box' ? item.boxPrice : item.stripPrice;
                total += currentPrice;
                div.innerHTML += `
                    <div class="bg-gray-50 p-4 rounded-2xl border border-gray-200 space-y-3">
                        <div class="flex justify-between font-black text-slate-700">
                            <span>${item.name}</span>
                            <button onclick="removeFromCart(${idx})" class="text-red-500"><i class="fas fa-times-circle"></i></button>
                        </div>
                        <div class="flex justify-between items-center">
                            <div class="flex bg-white p-1 rounded-xl border border-gray-200 text-[11px] font-bold">
                                <button onclick="setMode(${idx}, 'box')" class="px-4 py-1.5 rounded-lg ${item.mode==='box'?'bg-main text-white shadow-sm':'text-gray-400'}">کارتۆن</button>
                                <button onclick="setMode(${idx}, 'strip')" class="px-4 py-1.5 rounded-lg ${item.mode==='strip'?'bg-main text-white shadow-sm':'text-gray-400'}">شیت</button>
                            </div>
                            <span class="font-black text-main">${currentPrice.toLocaleString()} د.ع</span>
                        </div>
                    </div>`;
            });
            document.getElementById('cartTotal').innerText = total.toLocaleString();
        }

        function setMode(idx, mode) { cart[idx].mode = mode; updateCartUI(); }
        function removeFromCart(idx) { cart.splice(idx, 1); updateCartUI(); }

        async function checkout() {
            if(cart.length === 0) return;
            const now = new Date(); const dateStr = now.toLocaleDateString('en-CA');
            const payType = document.querySelector('input[name="payType"]:checked').value;
            const customer = document.getElementById('customerName').value || "نەقد";
            let total = 0; let receiptHtml = "";

            for(let item of cart) {
                const currentPrice = item.mode === 'box' ? item.boxPrice : item.stripPrice;
                total += currentPrice;
                receiptHtml += `<div style="display:flex;justify-content:space-between;margin:5px 0;"><span>${item.name} (${item.mode === 'box' ? 'کارتۆن' : 'شیت'})</span><span>${currentPrice.toLocaleString()}</span></div>`;
                
                // کەمکردنەوە لە کۆگا
                const ref = db.collection("inventory").doc(item.id);
                const doc = await ref.get();
                const reduction = item.mode === 'box' ? 1 : (1 / item.stripsPerBox);
                await ref.update({ qty: doc.data().qty - reduction });

                await db.collection("sales").add({ 
                    name: item.name, price: currentPrice, dateStr, 
                    type: payType, customer: customer, timestamp: now 
                });
            }

            document.getElementById('rDate').innerText = now.toLocaleString('ku-IQ');
            document.getElementById('rItems').innerHTML = receiptHtml;
            document.getElementById('rTotal').innerText = total.toLocaleString();
            
            window.print();
            cart = []; updateCartUI();
            document.getElementById('customerName').value = "";
            alert("فرۆشتنەکە سەرکەوتوو بوو و لە کۆگا کەمکرایەوە ✅");
        }

        function searchMedicine(target) {
            const inputId = target === 'inv' ? 'searchInput' : 'salesSearchInput';
            const t = document.getElementById(inputId).value.toLowerCase();
            const filtered = allMedicines.filter(m => m.name.toLowerCase().includes(t) || m.barcode.includes(t));
            
            if(target === 'inv') renderInventory(filtered);
            else {
                const res = document.getElementById('salesSearchResults'); res.innerHTML = "";
                if(t) filtered.forEach(item => {
                    res.innerHTML += `
                        <div onclick="addToCart('${item.id}','${item.name}',${item.price},${item.qty},${item.strips}); document.getElementById('salesSearchInput').value='';" 
                             class="p-4 bg-blue-50 rounded-2xl flex justify-between border-2 border-transparent hover:border-main cursor-pointer font-bold transition-all">
                            <span>${item.name} <small class="text-gray-400">(کۆگا: ${item.qty.toFixed(1)})</small></span>
                            <span class="text-main">${item.price.toLocaleString()}</span>
                        </div>`;
                });
            }
        }

        function loadReport() {
            const date = document.getElementById('reportDate').value;
            db.collection("sales").where("dateStr", "==", date).get().then(snap => {
                let cash = 0, debt = 0, listHtml = "";
                snap.forEach(doc => { 
                    const s = doc.data(); if(s.type === 'cash') cash += s.price; else debt += s.price;
                    listHtml += `<div class="flex justify-between border-b py-3 font-bold text-sm"><span>${s.name} (${s.customer})</span><span class="${s.type==='debt'?'text-red-500':'text-green-600'}">${s.price.toLocaleString()}</span></div>`;
                });
                document.getElementById('dailySummary').innerHTML = `
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div class="bg-white/10 p-3 rounded-xl">نەقد<br>${cash.toLocaleString()}</div>
                        <div class="bg-white/10 p-3 rounded-xl">قەرز<br>${debt.toLocaleString()}</div>
                    </div>
                    <div class="text-3xl font-black">کۆ: ${(cash+debt).toLocaleString()}</div>`;
                document.getElementById('allSalesList').innerHTML = listHtml;
            });
        }

        function changeColor(c) { mainColor = c; applyTheme(); localStorage.setItem('mainColor', c); location.reload(); }
    </script>
</body>
</html>
