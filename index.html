<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سیستەمی گشتگیری دەرمانخانە</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-100 font-sans text-right">

    <div id="loginPage" class="fixed inset-0 bg-slate-900 flex items-center justify-center z-[100]">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-80 text-center border-t-8 border-blue-600">
            <h2 class="text-xl font-bold mb-6">چوونەژوورەوە</h2>
            <input id="adminPass" type="password" placeholder="ڕەمزی نهێنی" class="w-full border p-3 rounded-2xl mb-4 text-center outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50">
            <button onclick="checkLogin()" class="w-full bg-blue-600 text-white py-3 rounded-2xl font-bold shadow-lg hover:bg-blue-700 transition">چوونەژوورەوە</button>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <nav class="bg-blue-800 text-white p-4 shadow-md flex justify-between items-center sticky top-0 z-50">
            <div class="flex items-center gap-2">
                <i class="fas fa-clinic-medical text-2xl text-blue-300"></i>
                <h1 class="font-bold">سیستەمی بەڕێوەبردنی گشتی</h1>
            </div>
            <div class="flex gap-2">
                <button onclick="window.print()" class="bg-white/20 px-3 py-1 rounded-lg text-sm hover:bg-white/30"><i class="fas fa-print"></i></button>
                <button onclick="location.reload()" class="bg-red-500 px-3 py-1 rounded-lg text-sm font-bold">دەرچوون</button>
            </div>
        </nav>

        <div class="container mx-auto p-4 md:p-6 space-y-6">
            
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="bg-white p-4 rounded-2xl shadow-sm border-r-4 border-green-500">
                    <p class="text-xs text-gray-500 font-bold">فرۆشی ئەمڕۆ</p>
                    <h3 id="dailyTotal" class="text-lg font-black text-green-700">0 د.ع</h3>
                </div>
                <div class="bg-white p-4 rounded-2xl shadow-sm border-r-4 border-blue-500">
                    <p class="text-xs text-gray-500 font-bold">دەرمان لە کۆگا</p>
                    <h3 id="stockCount" class="text-lg font-black text-blue-700">0</h3>
                </div>
                <div class="bg-white p-4 rounded-2xl shadow-sm border-r-4 border-red-500">
                    <p class="text-xs text-gray-500 font-bold">بەسەرچوون</p>
                    <h3 id="expiryAlert" class="text-lg font-black text-red-600">0</h3>
                </div>
                <div class="bg-white p-4 rounded-2xl shadow-sm border-r-4 border-purple-500">
                    <p class="text-xs text-gray-500 font-bold">فرۆشی مانگانە</p>
                    <h3 id="monthlyTotal" class="text-lg font-black text-purple-700">0 د.ع</h3>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                
                <div class="lg:col-span-5 space-y-6">
                    <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                        <h2 class="font-bold mb-4 text-blue-800 flex items-center gap-2 border-b pb-2">
                            <i class="fas fa-shopping-cart"></i> فرۆشتنی دەرمان
                        </h2>
                        <div class="space-y-3">
                            <input id="sellName" type="text" placeholder="ناوی دەرمان" class="w-full p-3 border rounded-xl bg-gray-50">
                            <div class="flex gap-2">
                                <input id="sellPrice" type="number" placeholder="نرخی فرۆشتن" class="flex-1 p-3 border rounded-xl bg-gray-50 text-center font-bold text-green-600">
                                <button onclick="processSale()" class="bg-green-600 text-white px-6 rounded-xl font-bold hover:bg-green-700 shadow-md">فرۆشتن</button>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white rounded-3xl shadow-sm border overflow-hidden">
                        <div class="bg-slate-50 p-3 border-b font-bold text-slate-700 text-sm">دوایین فرۆشراوەکان</div>
                        <div class="max-h-60 overflow-y-auto">
                            <table class="w-full text-right text-xs">
                                <tbody id="salesLog" class="divide-y"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div class="lg:col-span-7 space-y-6">
                    <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                        <h2 class="font-bold mb-4 text-blue-800 flex items-center gap-2 border-b pb-2">
                            <i class="fas fa-plus-square"></i> زیادکردن بۆ مەخزەن
                        </h2>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-2 text-sm">
                            <input id="stockName" type="text" placeholder="ناوی دەرمان" class="p-2 border rounded-lg">
                            <input id="stockPrice" type="number" placeholder="نرخ" class="p-2 border rounded-lg">
                            <input id="stockExpiry" type="date" class="p-2 border rounded-lg text-xs">
                            <button onclick="addToStock()" class="md:col-span-3 bg-blue-600 text-white py-2 rounded-xl font-bold mt-2">تۆمارکردن لە کۆگا</button>
                        </div>
                    </div>

                    <div class="bg-white rounded-3xl shadow-sm border overflow-hidden">
                        <div class="bg-slate-50 p-3 border-b font-bold text-slate-700 text-sm flex justify-between">
                            <span>لیستی دەرمانەکان لە مەخزەن</span>
                            <button onclick="window.print()" class="text-blue-600 hover:underline"><i class="fas fa-print"></i> چاپ</button>
                        </div>
                        <div class="max-h-80 overflow-y-auto">
                            <table class="w-full text-right text-xs">
                                <thead class="bg-gray-100">
                                    <tr><th class="p-3">ناو</th><th class="p-3 text-center">نرخ</th><th class="p-3 text-center">بەسەرچوون</th></tr>
                                </thead>
                                <tbody id="inventoryList" class="divide-y"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        const MY_PASS = "1998";
        let inventory = [];
        let totalSalesToday = 0;

        function checkLogin() {
            if(document.getElementById('adminPass').value === MY_PASS) {
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('mainApp').classList.remove('hidden');
            }
        }

        function addToStock() {
            const name = document.getElementById('stockName').value;
            const price = document.getElementById('stockPrice').value;
            const expiry = document.getElementById('stockExpiry').value;
            if(!name || !price || !expiry) return alert("تکایە هەموو زانیارییەکان بنوسە");

            inventory.push({name, price, expiry});
            updateInventoryUI();
            alert("دەرمانەکە زیادکرا");
            document.getElementById('stockName').value = "";
        }

        function updateInventoryUI() {
            const list = document.getElementById('inventoryList');
            list.innerHTML = "";
            let expiredCount = 0;
            inventory.forEach(item => {
                const isNearExp = checkExpiry(item.expiry);
                if(isNearExp) expiredCount++;
                list.innerHTML += `<tr class="hover:bg-gray-50"><td class="p-3 font-bold">${item.name}</td><td class="p-3 text-center">${Number(item.price).toLocaleString()}</td><td class="p-3 text-center ${isNearExp ? 'text-red-600 font-black' : ''}">${item.expiry}</td></tr>`;
            });
            document.getElementById('stockCount').innerText = inventory.length;
            document.getElementById('expiryAlert').innerText = expiredCount;
        }

        function checkExpiry(date) {
            const exp = new Date(date);
            const today = new Date();
            const diff = (exp.getFullYear() - today.getFullYear()) * 12 + (exp.getMonth() - today.getMonth());
            return diff <= 3;
        }

        function processSale() {
            const name = document.getElementById('sellName').value;
            const price = Number(document.getElementById('sellPrice').value);
            if(!name || !price) return alert("ناوی دەرمان و نرخەکە بنوسە");

            totalSalesToday += price;
            document.getElementById('dailyTotal').innerText = totalSalesToday.toLocaleString() + " د.ع";
            document.getElementById('monthlyTotal').innerText = totalSalesToday.toLocaleString() + " د.ع";

            const log = document.getElementById('salesLog');
            const now = new Date().toLocaleTimeString('ku-IQ', {hour: '2-digit', minute:'2-digit'});
            log.innerHTML = `<tr class="bg-green-50"><td class="p-2">${name}</td><td class="p-2 text-center text-green-700 font-bold">${price.toLocaleString()}</td><td class="p-2 text-left text-gray-400">${now}</td></tr>` + log.innerHTML;
            
            document.getElementById('sellName').value = "";
            document.getElementById('sellPrice').value = "";
        }
    </script>
</body>
</html>
