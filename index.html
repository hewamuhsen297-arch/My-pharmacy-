<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>کۆگای ڕۆژیار v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans Arabic', sans-serif; overflow-x: hidden; }
        .medicine-card { transition: all 0.3s ease; }
        .medicine-card:hover { transform: scale(1.02); }
    </style>
</head>
<body class="bg-gray-100">

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyArrrDsEpvnQhi3SFsEcQagVdlBbXMuqVE",
            authDomain: "rozhyar--pharmacy.firebaseapp.com",
            projectId: "rozhyar--pharmacy",
            storageBucket: "rozhyar--pharmacy.firebasestorage.app",
            messagingSenderId: "641814773252",
            appId: "1:641814773252:web:7a12ac6ded015ced5a7f51",
            measurementId: "G-2BL63CLH46"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
    </script>

    <div id="loginPage" class="fixed inset-0 bg-blue-900 flex items-center justify-center z-[100] px-4">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm text-center">
            <h1 class="text-3xl font-black text-blue-600 mb-2">ڕۆژیار</h1>
            <p class="text-gray-500 mb-6 font-bold">بەڕێوبەرایەتی کۆگا</p>
            <input id="passField" type="password" placeholder="ڕەمزی نهێنی" class="w-full border-2 p-4 rounded-2xl text-center mb-4 outline-none focus:border-blue-500 font-bold">
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg">چوونەژوورەوە</button>
        </div>
    </div>

    <div id="mainApp" class="hidden min-h-screen">
        <nav class="bg-blue-700 text-white p-4 flex justify-between items-center sticky top-0 z-50 shadow-lg">
            <span class="font-black text-xl"><i class="fas fa-pills ml-2"></i>کۆگای ڕۆژیار</span>
            <button onclick="location.reload()" class="bg-red-500 px-4 py-2 rounded-xl text-xs font-bold">دەرچوون</button>
        </nav>

        <div class="p-4 max-w-2xl mx-auto space-y-6">
            
            <div class="relative">
                <input type="text" id="searchInput" onkeyup="searchMedicine()" placeholder="بگەڕێ بۆ ناوی دەرمان..." class="w-full p-4 pr-12 rounded-2xl border-none shadow-sm outline-none focus:ring-2 focus:ring-blue-400 font-bold text-right">
                <i class="fas fa-search absolute right-4 top-5 text-gray-400"></i>
            </div>

            <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-200">
                <h2 class="font-black text-blue-600 mb-4 flex items-center"><i class="fas fa-plus-circle ml-2"></i>زیادکردنی دەرمانی نوێ</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <input id="mName" type="text" placeholder="ناوی دەرمان" class="w-full p-3 bg-gray-50 rounded-xl border-none outline-none focus:ring-2 focus:ring-blue-400 font-bold">
                    <input id="mPrice" type="number" placeholder="نرخی فرۆشتن" class="w-full p-3 bg-gray-50 rounded-xl border-none outline-none focus:ring-2 focus:ring-blue-400 font-bold">
                    <input id="mQty" type="number" placeholder="بڕ (شریت)" class="w-full p-3 bg-gray-50 rounded-xl border-none outline-none focus:ring-2 focus:ring-blue-400 font-bold">
                    <button onclick="addMedicine()" id="addBtn" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold shadow-md hover:bg-blue-700">تۆمارکردن</button>
                </div>
            </div>

            <div class="space-y-3">
                <div class="flex justify-between items-center px-2">
                    <h2 class="font-black text-gray-700">لیستی کۆگا</h2>
                    <span id="itemCount" class="bg-blue-100 text-blue-600 px-3 py-1 rounded-full text-xs font-bold">0 دەرمان</span>
                </div>
                <div id="medicineList" class="space-y-3 pb-20">
                    </div>
            </div>
        </div>
    </div>

    <script>
        let allMedicines = [];

        function handleLogin() {
            if(document.getElementById('passField').value === "1998") {
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                loadData();
            } else { alert("ڕەمزەکە هەڵەیە!"); }
        }

        async function addMedicine() {
            const name = document.getElementById('mName').value;
            const price = document.getElementById('mPrice').value;
            const qty = document.getElementById('mQty').value;

            if(!name || !price || !qty) return alert("تکایە هەموو زانیارییەکان پڕ بکەرەوە");

            const btn = document.getElementById('addBtn');
            btn.disabled = true; btn.innerText = "خەریکە پاشەکەوت دەبێت...";

            try {
                await db.collection("inventory").add({
                    name: name,
                    price: parseFloat(price),
                    qty: parseInt(qty),
                    searchName: name.toLowerCase(),
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                document.getElementById('mName').value = "";
                document.getElementById('mPrice').value = "";
                document.getElementById('mQty').value = "";
            } catch (e) { alert("هەڵەیەک ڕوویدا!"); }
            btn.disabled = false; btn.innerText = "تۆمارکردن";
        }

        function loadData() {
            db.collection("inventory").orderBy("createdAt", "desc").onSnapshot((snapshot) => {
                allMedicines = [];
                snapshot.forEach(doc => {
                    allMedicines.push({id: doc.id, ...doc.data()});
                });
                renderList(allMedicines);
            });
        }

        function renderList(data) {
            const listDiv = document.getElementById('medicineList');
            document.getElementById('itemCount').innerText = `${data.length} دەرمان`;
            listDiv.innerHTML = "";
            
            data.forEach(item => {
                listDiv.innerHTML += `
                    <div class="medicine-card bg-white p-5 rounded-2xl shadow-sm border-r-8 border-blue-500 flex justify-between items-center">
                        <div class="flex-1">
                            <div class="font-black text-lg text-slate-800">${item.name}</div>
                            <div class="flex gap-4 mt-1">
                                <span class="text-sm text-gray-500 font-bold"><i class="fas fa-layer-group ml-1"></i>${item.qty} شریت</span>
                                <span class="text-sm text-green-600 font-bold"><i class="fas fa-tag ml-1"></i>${item.price} دینار</span>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="deleteItem('${item.id}')" class="text-red-400 hover:text-red-600 p-2">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        function searchMedicine() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allMedicines.filter(m => m.name.toLowerCase().includes(term));
            renderList(filtered);
        }

        async function deleteItem(id) {
            if(confirm("دڵنیای لە سڕینەوەی ئەم دەرمانە؟")) {
                await db.collection("inventory").doc(id).delete();
            }
        }
    </script>
</body>
</html>
