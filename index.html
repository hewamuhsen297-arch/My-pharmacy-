<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>کۆگای ڕۆژیار - وەشانی کۆتایی</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans Arabic', sans-serif; background-color: #f8fafc; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyArrrDsEpvnQhi3SFsEcQagVdlBbXMuqVE",
            authDomain: "rozhyar--pharmacy.firebaseapp.com",
            projectId: "rozhyar--pharmacy",
            storageBucket: "rozhyar--pharmacy.firebasestorage.app",
            messagingSenderId: "641814773252",
            appId: "1:641814773252:web:7a12ac6ded015ced5a7f51",
            measurementId: "G-2BL63CLH46"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
    </script>

    <div id="loginPage" class="fixed inset-0 bg-slate-900 flex items-center justify-center z-[100] px-4">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm text-center border-t-8 border-blue-600">
            <h1 class="text-3xl font-black text-blue-600 mb-6 font-bold">ڕۆژیار</h1>
            <input id="passField" type="password" placeholder="ڕەمزی نهێنی" class="w-full border-2 p-4 rounded-2xl text-center mb-4 outline-none focus:border-blue-500 font-bold">
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg">چوونەژوورەوە</button>
        </div>
    </div>

    <div id="mainApp" class="hidden min-h-screen">
        <nav class="bg-blue-700 text-white p-4 sticky top-0 z-50 flex justify-between items-center shadow-lg">
            <span class="font-black">کۆگای ڕۆژیار</span>
            <div class="flex gap-2">
                <button onclick="switchTab('report')" class="bg-blue-500 px-3 py-1 rounded-lg text-xs font-bold">ڕاپۆرت</button>
                <button onclick="location.reload()" class="bg-red-500 px-3 py-1 rounded-lg text-xs font-bold">دەرچوون</button>
            </div>
        </nav>

        <div id="inventoryTab" class="tab-content active p-4 max-w-2xl mx-auto space-y-4">
            <input type="text" id="searchInput" onkeyup="searchMedicine()" placeholder="بگەڕێ..." class="w-full p-4 rounded-2xl shadow-sm outline-none text-right font-bold">
            
            <div class="bg-white p-5 rounded-3xl shadow-sm border">
                <h2 class="font-black text-blue-600 mb-4 border-b pb-2">زیادکردن</h2>
                <input id="mName" type="text" placeholder="ناوی دەرمان" class="w-full p-3 mb-2 bg-gray-50 rounded-xl outline-none font-bold">
                <div class="flex gap-2 mb-2">
                    <input id="mPrice" type="number" placeholder="نرخ" class="w-1/2 p-3 bg-gray-50 rounded-xl outline-none font-bold">
                    <input id="mQty" type="number" placeholder="بڕ" class="w-1/2 p-3 bg-gray-50 rounded-xl outline-none font-bold">
                </div>
                <button onclick="addMedicine()" id="addBtn" class="w-full bg-green-500 text-white py-3 rounded-xl font-bold">تۆمارکردن</button>
            </div>
            <div id="medicineList" class="space-y-3 pb-24"></div>
        </div>

        <div id="reportTab" class="tab-content p-4 max-w-2xl mx-auto">
            <button onclick="switchTab('inventory')" class="mb-4 text-blue-600 font-bold">گەڕانەوە</button>
            <div id="salesList" class="bg-white p-6 rounded-3xl shadow-sm space-y-3"></div>
        </div>
    </div>

    <script>
        let allMedicines = [];
        function handleLogin() {
            if(document.getElementById('passField').value === "1998") {
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('mainApp').classList.remove('hidden');
                loadData();
            } else { alert("هەڵەیە!"); }
        }

        function switchTab(t) {
            document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
            document.getElementById(t + 'Tab').classList.add('active');
            if(t === 'report') loadSales();
        }

        async function addMedicine() {
            const n = document.getElementById('mName').value, p = parseFloat(document.getElementById('mPrice').value), q = parseInt(document.getElementById('mQty').value);
            if(!n || isNaN(p) || isNaN(q)) return alert("هەمووی پڕبکەرەوە");
            await db.collection("inventory").add({ name: n, price: p, qty: q, date: new Date() });
            document.getElementById('mName').value = ""; document.getElementById('mPrice').value = ""; document.getElementById('mQty').value = "";
        }

        function loadData() {
            db.collection("inventory").orderBy("name").onSnapshot(snap => {
                allMedicines = []; snap.forEach(doc => allMedicines.push({id: doc.id, ...doc.data()}));
                render(allMedicines);
            });
        }

        function render(data) {
            const div = document.getElementById('medicineList'); div.innerHTML = "";
            data.forEach(item => {
                div.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl shadow-sm border-r-8 border-blue-500 flex justify-between items-center">
                        <div><div class="font-black">${item.name}</div><div class="text-xs text-gray-500 font-bold">بڕ: ${item.qty} | نرخ: ${item.price}</div></div>
                        <div class="flex gap-2">
                            <button onclick="sell('${item.id}', '${item.name}', ${item.qty}, ${item.price})" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-xs font-bold font-bold">Sale</button>
                            <button onclick="deleteItem('${item.id}')" class="text-red-400"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>`;
            });
        }

        async function sell(id, n, q, p) {
            if(q <= 0) return alert("نەماوە");
            await db.collection("inventory").doc(id).update({ qty: q - 1 });
            await db.collection("sales").add({ name: n, price: p, date: new Date() });
        }

        async function deleteItem(id) { if(confirm("بیسڕمەوە؟")) await db.collection("inventory").doc(id).delete(); }
        
        function searchMedicine() {
            const t = document.getElementById('searchInput').value.toLowerCase();
            render(allMedicines.filter(m => m.name.toLowerCase().includes(t)));
        }

        function loadSales() {
            const div = document.getElementById('salesList'); div.innerHTML = "باردەکرێت...";
            db.collection("sales").where("date", ">=", new Date(new Date().setHours(0,0,0,0))).get().then(snap => {
                div.innerHTML = "<h2 class='font-black mb-4'>فرۆشتنی ئەمڕۆ</h2>";
                let t = 0;
                snap.forEach(doc => { const s = doc.data(); t += s.price; div.innerHTML += `<div class='flex justify-between border-b py-2'><span>${s.name}</span><span>${s.price}</span></div>`; });
                div.innerHTML += `<div class='mt-4 font-black text-blue-700'>کۆی گشتی: ${t} دینار</div>`;
            });
        }
    </script>
</body>
</html>
