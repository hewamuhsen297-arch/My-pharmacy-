<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ڕاپۆرتی ڕۆژانەی دەرمانخانە</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 font-sans">

    <div id="mainDashboard">
        <nav class="bg-blue-800 text-white p-4 shadow-lg flex justify-between items-center no-print">
            <h1 class="font-bold"><i class="fas fa-chart-line ml-2"></i>ڕاپۆرتی فرۆشتنی ڕۆژانە</h1>
            <button onclick="window.print()" class="bg-green-600 px-4 py-2 rounded-xl text-sm font-bold shadow hover:bg-green-700 transition">
                <i class="fas fa-print ml-1"></i> چاپی ڕاپۆرت
            </button>
        </nav>

        <div class="container mx-auto p-4 space-y-6">
            
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 no-print">
                <div class="bg-white p-5 rounded-2xl shadow border-r-4 border-blue-500">
                    <p class="text-gray-500 text-xs font-bold mb-1">کۆی فرۆشتن</p>
                    <h3 id="totalMoney" class="text-xl font-black text-blue-700">0 د.ع</h3>
                </div>
                <div class="bg-white p-5 rounded-2xl shadow border-r-4 border-green-500">
                    <p class="text-gray-500 text-xs font-bold mb-1">دەرمانی فرۆشراو</p>
                    <h3 id="itemsCount" class="text-xl font-black text-green-700">0</h3>
                </div>
                <div class="bg-white p-5 rounded-2xl shadow border-r-4 border-purple-500">
                    <p class="text-gray-500 text-xs font-bold mb-1">بەروار</p>
                    <h3 class="text-sm font-bold text-gray-700" id="currentDate"></h3>
                </div>
            </div>

            <div class="bg-white rounded-3xl shadow-lg border overflow-hidden">
                <div class="bg-gray-50 p-4 border-b">
                    <h2 class="font-bold text-gray-700"><i class="fas fa-list-check ml-2"></i>لیستی وردەکاری فرۆشتن</h2>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-right">
                        <thead class="bg-blue-50 text-blue-800 uppercase text-sm">
                            <tr>
                                <th class="p-4 border-b">ناوی دەرمان</th>
                                <th class="p-4 border-b text-center">نرخ (د.ع)</th>
                                <th class="p-4 border-b text-center">کات</th>
                                <th class="p-4 border-b text-center">کردار</th>
                            </tr>
                        </thead>
                        <tbody id="reportTableBody" class="divide-y divide-gray-100">
                            </tbody>
                    </table>
                </div>
                <div id="emptyMsg" class="p-10 text-center text-gray-400 italic">
                    هێشتا هیچ فرۆشتنێک تۆمار نەکراوە بۆ ئەمڕۆ.
                </div>
            </div>

            <div class="bg-blue-50 p-6 rounded-2xl border-2 border-dashed border-blue-200 no-print">
                <h3 class="font-bold mb-3 text-blue-800 text-sm">تاقی کردنەوەی فرۆشتن:</h3>
                <div class="flex gap-2">
                    <input id="testName" type="text" placeholder="ناوی دەرمان" class="flex-1 p-3 rounded-xl border">
                    <input id="testPrice" type="number" placeholder="نرخ" class="w-32 p-3 rounded-xl border">
                    <button onclick="addSaleRecord()" class="bg-blue-600 text-white px-6 rounded-xl font-bold">زیادکردن</button>
                </div>
            </div>
        </div>
    </div>

    <style>
        @media print {
            .no-print { display: none !important; }
            body { background: white; }
            .shadow-lg { shadow: none !important; border: 1px solid #eee; }
        }
    </style>

    <script>
        document.getElementById('currentDate').innerText = new Date().toLocaleDateString('ku-IQ');
        let totalSales = 0;
        let count = 0;

        function addSaleRecord() {
            const name = document.getElementById('testName').value;
            const price = document.getElementById('testPrice').value;
            
            if(!name || !price) return alert("زانیارییەکان بنوسە");

            document.getElementById('emptyMsg').classList.add('hidden');
            const now = new Date().toLocaleTimeString('ku-IQ', {hour: '2-digit', minute:'2-digit'});
            
            const row = `
                <tr class="hover:bg-gray-50 transition">
                    <td class="p-4 font-bold text-gray-800">${name}</td>
                    <td class="p-4 text-center text-green-600 font-bold">${Number(price).toLocaleString()}</td>
                    <td class="p-4 text-center text-gray-500">${now}</td>
                    <td class="p-4 text-center">
                        <button class="text-red-400 hover:text-red-600"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `;

            document.getElementById('reportTableBody').insertAdjacentHTML('afterbegin', row);
            
            totalSales += Number(price);
            count++;
            
            document.getElementById('totalMoney').innerText = totalSales.toLocaleString() + " د.ع";
            document.getElementById('itemsCount').innerText = count;

            // Reset inputs
            document.getElementById('testName').value = "";
            document.getElementById('testPrice').value = "";
        }
    </script>
</body>
</html>
