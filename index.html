<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سیستەمی پێشکەوتووی سەیدەلیە</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 font-sans text-right">

    <div id="loginPage" class="fixed inset-0 bg-blue-900 flex items-center justify-center z-[100]">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-80 text-center">
            <h2 class="text-xl font-bold mb-6">بەڕێوبەری دەرمانخانە</h2>
            <input id="adminPass" type="password" placeholder="ڕەمزی نهێنی" class="w-full border p-3 rounded-2xl mb-4 text-center outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50">
            <button onclick="checkLogin()" class="w-full bg-blue-600 text-white py-3 rounded-2xl font-bold shadow-lg">چوونەژوورەوە</button>
        </div>
    </div>

    <div id="mainDashboard" class="hidden">
        <nav class="bg-blue-800 text-white p-4 shadow-xl flex justify-between items-center">
            <h1 class="font-bold"><i class="fas fa-prescription-bottle-alt ml-2"></i>سیستەمی کۆگا و فرۆشتن</h1>
            <button onclick="location.reload()" class="bg-red-500 px-4 py-1 rounded-xl text-xs">دەرچوون</button>
        </nav>

        <div class="container mx-auto p-4 space-y-6">
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="bg-white p-4 rounded-2xl shadow border-r-4 border-blue-500">
                    <p class="text-gray-500 text-sm">فرۆشی ئەمڕۆ</p>
                    <h3 id="dailySales" class="text-xl font-bold">0 د.ع</h3>
                </div>
                <div class="bg-white p-4 rounded-2xl shadow border-r-4 border-red-500">
                    <p class="text-gray-500 text-sm">دەرمانی نزیک لە بەسەرچوون</p>
                    <h3 id="expiryAlerts" class="text-xl font-bold text-red-600">0</h3>
                </div>
                <div class="bg-white p-4 rounded-2xl shadow border-r-4 border-green-500">
                    <p class="text-gray-500 text-sm">کۆی دەرمان لە کۆگا</p>
                    <h3 id="stockTotal" class="text-xl font-bold">0</h3>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="bg-white p-6 rounded-3xl shadow border">
                    <h2 class="font-bold mb-4 text-blue-700 border-b pb-2"><i class="fas fa-plus-circle ml-2"></i>زیادکردن بۆ کۆگا</h2>
                    <div class="grid grid-cols-2 gap-3">
                        <input id="newName" type="text" placeholder="ناوی دەرمان" class="col-span-2 border p-3 rounded-xl bg-gray-50">
                        <input id="newPrice" type="number" placeholder="نرخی فرۆشتن" class="border p-3 rounded-xl bg-gray-50">
                        <input id="newExpiry" type="date" class="border p-3 rounded-xl bg-gray-50">
                        <input id="newBarcode" type="text" placeholder="بارکۆد" class="col-span-2 border p-3 rounded-xl bg-gray-50">
                        <button onclick="addItem()" class="col-span-2 bg-blue-600 text-white py-3 rounded-xl font-bold shadow-md">تۆمارکردن</button>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-3xl shadow border overflow-hidden">
                    <h2 class="font-bold mb-4 text-red-600 border-b pb-2"><i class="fas fa-exclamation-triangle ml-2"></i>ئاگاداری بەسەرچوون</h2>
                    <div id="expiryList" class="space-y-2 text-sm max-h-60 overflow-y-auto">
                        <p class="text-gray-400 italic">هیچ دەرمانێکی بەسەرچوو نییە</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const MY_PASS = "1998";
        let inventory = [];

        function checkLogin() {
            if(document.getElementById('adminPass').value === MY_PASS) {
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('mainDashboard').classList.remove('hidden');
            }
        }

        function addItem() {
            const name = document.getElementById('newName').value;
            const price = document.getElementById('newPrice').value;
            const expiry = document.getElementById('newExpiry').value;
            const barcode = document.getElementById('newBarcode').value;

            if(!name || !expiry) return alert("تکایە زانیارییەکان تەواو بکە");

            const item = { name, price, expiry, barcode };
            inventory.push(item);
            updateUI();
            
            // پاککردنەوە
            document.getElementById('newName').value = "";
            alert("دەرمانەکە زیادکرا");
        }

        function updateUI() {
            document.getElementById('stockTotal').innerText = inventory.length;
            const list = document.getElementById('expiryList');
            const alertCount = document.getElementById('expiryAlerts');
            list.innerHTML = "";
            let alerts = 0;

            const today = new Date();
            const threeMonthsLater = new Date();
            threeMonthsLater.setMonth(today.getMonth() + 3);

            inventory.forEach(item => {
                const expiryDate = new Date(item.expiry);
                if(expiryDate <= threeMonthsLater) {
                    alerts++;
                    list.innerHTML += `
                        <div class="flex justify-between bg-red-50 p-3 rounded-xl border-r-4 border-red-500">
                            <span class="font-bold text-red-700">${item.name}</span>
                            <span class="text-red-600">بەسەردەچێت لە: ${item.expiry}</span>
                        </div>
                    `;
                }
            });

            alertCount.innerText = alerts;
            if(alerts === 0) list.innerHTML = `<p class="text-gray-400 italic">هیچ دەرمانێکی بەسەرچوو نییە</p>`;
        }
    </script>
</body>
</html>
