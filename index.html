<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>کۆگای ڕۆژیار</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans Arabic', sans-serif; }
    </style>
</head>
<body class="bg-slate-100">

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyArrrDsEpvnQhi3SFsEcQagVdlBbXMuqVE",
            authDomain: "rozhyar--pharmacy.firebaseapp.com",
            projectId: "rozhyar--pharmacy",
            storageBucket: "rozhyar--pharmacy.firebasestorage.app",
            messagingSenderId: "641814773252",
            appId: "1:641814773252:web:7a12ac6ded015ced5a7f51",
            measurementId: "G-2BL63CLH46"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
    </script>

    <div id="loginPage" class="fixed inset-0 bg-blue-900 flex items-center justify-center z-[100] px-4">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm text-center">
            <h1 class="text-2xl font-black text-blue-600 mb-6">سەیدەلیەی ڕۆژیار</h1>
            <input id="passField" type="password" placeholder="ڕەمزی نهێنی" class="w-full border-2 p-4 rounded-2xl text-center mb-4 outline-none focus:border-blue-500">
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold">چوونەژوورەوە</button>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <nav class="bg-blue-600 text-white p-4 flex justify-between items-center sticky top-0 z-50 shadow-md">
            <span class="font-black text-lg">کۆگای ڕۆژیار</span>
            <button onclick="location.reload()" class="bg-red-500 px-3 py-1 rounded-lg text-sm">دەرچوون</button>
        </nav>

        <div class="p-4 max-w-md mx-auto space-y-6">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                <h2 class="font-black text-blue-600 mb-4 border-b pb-2"><i class="fas fa-plus-circle ml-2"></i>زیادکردنی دەرمان</h2>
                <div class="space-y-3">
                    <input id="mName" type="text" placeholder="ناوی دەرمان" class="w-full p-3 bg-gray-50 rounded-xl border-none outline-none focus:ring-2 focus:ring-blue-400">
                    <input id="mPrice" type="number" placeholder="نرخی پاکەت" class="w-full p-3 bg-gray-50 rounded-xl border-none outline-none focus:ring-2 focus:ring-blue-400">
                    <input id="mQty" type="number" placeholder="کۆی شریتەکان" class="w-full p-3 bg-gray-50 rounded-xl border-none outline-none focus:ring-2 focus:ring-blue-400">
                    <button onclick="addMedicine()" id="addBtn" class="w-full bg-green-500 text-white py-3 rounded-xl font-bold shadow-lg hover:bg-green-600 transition-all">تۆمارکردن</button>
                </div>
            </div>

            <div class="space-y-3">
                <h2 class="font-black text-gray-700 px-2">لیستی دەرمانەکان</h2>
                <div id="medicineList" class="space-y-3">
                    </div>
            </div>
        </div>
    </div>

    <script>
        function handleLogin() {
            const pass = document.getElementById('passField').value;
            if(pass === "1998") {
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('mainApp').classList.remove('hidden');
                loadData();
            } else { alert("ڕەمزەکە هەڵەیە!"); }
        }

        async function addMedicine() {
            const name = document.getElementById('mName').value;
            const price = document.getElementById('mPrice').value;
            const qty = document.getElementById('mQty').value;

            if(!name || !price || !qty) return alert("تکایە هەموو خانەکان پڕبکەرەوە");

            const btn = document.getElementById('addBtn');
            btn.disabled = true;
            btn.innerText = "خەریکە تۆمار دەبێت...";

            try {
                await db.collection("inventory").add({
                    name: name,
                    price: parseFloat(price),
                    qty: parseInt(qty),
                    date: new Date().toISOString()
                });
                alert("دەرمانەکە بە سەرکەوتوویی زیادکرا");
                document.getElementById('mName').value = "";
                document.getElementById('mPrice').value = "";
                document.getElementById('mQty').value = "";
                loadData();
            } catch (e) { alert("هەڵەیەک ڕوویدا!"); }
            btn.disabled = false;
            btn.innerText = "تۆمارکردن";
        }

        function loadData() {
            const listDiv = document.getElementById('medicineList');
            listDiv.innerHTML = "<p class='text-center text-gray-400'>خەریکە داتا دەهێنرێت...</p>";

            db.collection("inventory").orderBy("date", "desc").onSnapshot((snapshot) => {
                listDiv.innerHTML = "";
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    listDiv.innerHTML += `
                        <div class="bg-white p-4 rounded-2xl shadow-sm border-r-4 border-blue-500 flex justify-between items-center">
                            <div>
                                <div class="font-black text-slate-800">${data.name}</div>
                                <div class="text-xs text-gray-500">مەوجود: ${data.qty} شریت</div>
                            </div>
                            <div class="text-blue-600 font-bold">${data.price} دینار</div>
                        </div>
                    `;
                });
            });
        }
    </script>
</body>
</html>
