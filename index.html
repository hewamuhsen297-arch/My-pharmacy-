<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سەیدەلیەی ڕۆژیار - بەحرکە</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @font-face { font-family: 'Kurdish'; src: local('Arial'); }
        body { font-family: 'Kurdish', sans-serif; }
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            .invoice-box { width: 80mm; padding: 5mm; border: 1px solid #eee; margin: auto; }
        }
        .print-only { display: none; }
    </style>
</head>
<body class="bg-gray-100">

    <nav class="bg-blue-900 text-white p-4 shadow-lg flex justify-between items-center no-print sticky top-0 z-50">
        <div>
            <h1 class="text-2xl font-black">سەیدەلیەی ڕۆژیار</h1>
            <p class="text-xs text-blue-200">بەحرکە - جوت سایدی گشتی - مزگەوتی مەلا ڕەشید</p>
        </div>
        <button onclick="location.reload()" class="bg-red-600 px-4 py-2 rounded-xl font-bold hover:bg-red-700 transition">دەرچوون</button>
    </nav>

    <div class="container mx-auto p-4 space-y-6 no-print">
        
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <div class="lg:col-span-5 bg-white p-6 rounded-3xl shadow-sm border border-blue-100">
                <h2 class="text-xl font-bold mb-4 text-blue-800 border-b pb-2"><i class="fas fa-box-open ml-2"></i>داخڵکردنی دەرمان</h2>
                <div class="grid grid-cols-1 gap-3">
                    <input id="stName" type="text" placeholder="ناوی دەرمان" class="p-3 border rounded-xl bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none font-bold">
                    
                    <select id="stType" class="p-3 border rounded-xl bg-white focus:ring-2 focus:ring-blue-500 outline-none">
                        <option value="" disabled selected>جۆری دەرمان هەڵبژێرە...</option>
                        <option value="تابلێت">تابلێت (Tablet)</option>
                        <option value="کەپسول">کەپسول (Capsule)</option>
                        <option value="سۆفت جێل">سۆفت جێل (Softgel)</option>
                        <option value="شراب">شراب (Syrup)</option>
                        <option value="مرهم">مرهم (Ointment)</option>
                        <option value="کرێم">کرێم (Cream)</option>
                        <option value="جێل">جێل (Gel)</option>
                        <option value="بتڵ">بتڵ (Bottle)</option>
                        <option value="ڤیەل">ڤیەل (Vial)</option>
                        <option value="امپول">امپول (Ampoule)</option>
                        <option value="دڵۆپە">دڵۆپە (Drops)</option>
                        <option value="بۆخاو">بۆخاو (Inhaler)</option>
                    </select>

                    <div class="grid grid-cols-2 gap-2">
                        <input id="stPackPrice" type="number" placeholder="نرخی پاکەت" class="p-3 border rounded-xl">
                        <input id="stStripsPerPack" type="number" placeholder="چەند شریتی تێدایە؟" class="p-3 border rounded-xl">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <input id="stQtyPacks" type="number" placeholder="بڕ (پاکەت)" class="p-3 border rounded-xl bg-blue-50 font-bold">
                        <input id="stExpiry" type="date" class="p-3 border rounded-xl text-xs">
                    </div>
                    <button onclick="saveToStock()" class="w-full bg-blue-700 text-white py-4 rounded-xl font-bold shadow-lg hover:bg-blue-800 transition">تۆمارکردن لە کۆگا</button>
                </div>
            </div>

            <div class="lg:col-span-7 bg-white p-6 rounded-3xl shadow-sm border border-green-100">
                <h2 class="text-xl font-bold mb-4 text-green-800 border-b pb-2"><i class="fas fa-cart-plus ml-2"></i>فرۆشتن</h2>
                <div class="flex flex-col md:flex-row gap-4 mb-6">
                    <select id="sellSelect" class="flex-1 p-4 border-2 border-green-200 rounded-2xl bg-gray-50 font-bold outline-none"></select>
                    <div class="flex items-center gap-2">
                        <select id="sellUnit" class="p-4 border-2 border-green-200 rounded-2xl bg-white font-bold">
                            <option value="pack">پاکەت</option>
                            <option value="strip">شریت</option>
                        </select>
                    </div>
                    <input id="sellQty" type="number" value="1" min="1" class="w-20 p-4 border-2 border-green-200 rounded-2xl text-center font-bold">
                    <button onclick="addToCart()" class="bg-green-600 text-white px-8 py-4 rounded-2xl font-black shadow-lg hover:bg-green-700 transition">زیادکردن</button>
                </div>

                <div class="border rounded-2xl overflow-hidden max-h-64 overflow-y-auto">
                    <table class="w-full text-right">
                        <thead class="bg-green-50 sticky top-0">
                            <tr>
                                <th class="p-3">دەرمان</th>
                                <th class="p-3 text-center">جۆر</th>
                                <th class="p-3 text-center">بڕ</th>
                                <th class="p-3 text-center">نرخ</th>
                                <th class="p-3 text-center"></th>
                            </tr>
                        </thead>
                        <tbody id="cartItems"></tbody>
                    </table>
                </div>
                <div class="mt-4 flex justify-between items-center p-4 bg-gray-50 rounded-2xl">
                    <h3 class="text-2xl font-black text-gray-800">کۆی گشتی: <span id="cartTotal" class="text-green-700">0</span> د.ع</h3>
                    <button onclick="printInvoice()" class="bg-blue-600 text-white px-10 py-3 rounded-xl font-bold shadow-md hover:bg-blue-700 transition">چاپی وەسڵ</button>
                </div>
            </div>
        </div>

        <div class="bg-white p-6 rounded-3xl shadow-sm border">
            <h2 class="font-bold mb-4 text-gray-700 border-b pb-2">لیستی گشتی کۆگا</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-right border-collapse text-sm">
                    <thead class="bg-gray-100">
                        <tr>
                            <th class="p-3 border">ناو و جۆر</th>
                            <th class="p-3 border text-center">بڕی ماوە</th>
                            <th class="p-3 border text-center">نرخی پاکەت</th>
                            <th class="p-3 border text-center">بەسەرچوون</th>
                        </tr>
                    </thead>
                    <tbody id="inventoryTable"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="invoice" class="print-only invoice-box text-right">
        <div class="text-center mb-4">
            <h1 class="text-2xl font-black">سەیدەلیەی ڕۆژیار</h1>
            <p class="text-sm">بەحرکە - جوت سایدی گشتی - مزگەوتی مەلا ڕەشید</p>
            <p class="text-xs text-gray-500" id="invDate"></p>
            <div class="border-b-2 border-dashed my-2"></div>
        </div>
        <table class="w-full text-sm mb-4">
            <tbody id="invBody"></tbody>
        </table>
        <div class="border-t-2 border-dashed pt-2 font-black text-xl flex justify-between">
            <span>کۆی گشتی:</span>
            <span id="invTotal">0</span>
        </div>
        <div class="text-center mt-6 text-xs italic">تەندروست بن -
