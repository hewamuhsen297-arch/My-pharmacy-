<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سەیدەلیەی ڕۆژیار</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-100 font-sans text-right">

    <div id="loginPage" class="fixed inset-0 bg-slate-900 flex items-center justify-center z-[100]">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-80 text-center border-t-8 border-blue-600">
            <h1 class="text-2xl font-black text-blue-600 mb-2">سەیدەلیەی ڕۆژیار</h1>
            <p class="text-gray-400 text-sm mb-6">سیستەمی بەڕێوەبردنی دەرمان</p>
            <select id="userRole" class="w-full border p-3 rounded-2xl mb-3 bg-gray-50 outline-none">
                <option value="staff">کارمەند (تەنها فرۆشتن و داخڵکردن)</option>
                <option value="admin">بەڕێوبەر (دەسەڵاتی گشتی)</option>
            </select>
            <input id="passField" type="password" placeholder="ڕەمزی نهێنی" class="w-full border p-3 rounded-2xl mb-4 text-center outline-none focus:ring-2 focus:ring-blue-500">
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white py-3 rounded-2xl font-bold shadow-lg hover:bg-blue-700 transition">چوونەژوورەوە</button>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <nav class="bg-blue-800 text-white p-4 shadow-md flex justify-between items-center sticky top-0 z-50">
            <div class="flex items-center gap-2">
                <i class="fas fa-clinic-medical text-2xl text-blue-300"></i>
                <h1 class="font-bold text-xl">سەیدەلیەی ڕۆژیار</h1>
            </div>
            <button onclick="location.reload()" class="bg-red-500 px-4 py-1 rounded-xl text-sm font-bold">دەرچوون</button>
        </nav>

        <div class="container mx-auto p-4 space-y-6">
            
            <div id="adminStats" class="grid grid-cols-2 md:grid-cols-4 gap-4 hidden">
                <div class="bg-white p-4 rounded-2xl shadow-sm border-r-4 border-green-500">
                    <p class="text-xs text-gray-500 font-bold">کۆی فرۆشی ئەمڕۆ</p>
                    <h3 id="dailyTotal" class="text-lg font-black text-green-700">0 د.ع</h3>
                </div>
                <div class="bg-white p-4 rounded-2xl shadow-sm border-r-4 border-blue-500">
                    <p class="text-xs text-gray-500 font-bold">قازانجی خەمڵێنراو</p>
                    <h3 id="profitTotal" class="text-lg font-black text-blue-700">0 د.ع</h3>
                </div>
                <div class="bg-white p-4 rounded-2xl shadow-sm border-r-4 border-red-500 text-center">
                    <p class="text-xs text-gray-500 font-bold">بەسەرچوون</p>
                    <h3 id="expCount" class="text-lg font-black text-red-600">0</h3>
                </div>
                <button onclick="window.print()" class="bg-slate-800 text-white rounded-2xl font-bold text-sm">چاپی ڕاپۆرت</button>
            </div>

            <div id="scannerModal" class="fixed inset-0 bg-black/90 z-[200] hidden flex flex-col items-center justify-center p-4">
                <div id="reader" class="w-full max-w-md bg-white rounded-2xl overflow-hidden"></div>
                <button onclick="stopScanner()" class="mt-6 bg-red-600 text-white px-8 py-3 rounded-full font-bold">داخستنی کامێرا</button>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="bg-white p-6 rounded-3xl shadow-sm border">
                    <h2 class="font-bold mb-4 text-blue-800 flex justify-between items-center border-b pb-2">
                        <span><i class="fas fa-barcode ml-2"></i>بەشی فرۆشتن</span>
                        <button onclick="startScanner('sell')" class="text-blue-600 text-sm bg-blue-50 px-3 py-1 rounded-lg"><i class="fas fa-camera ml-1"></i>سکان</button>
                    </h2>
                    <div class="space-y-4">
                        <input id="sellBarcode" type="text" placeholder="بارکۆدی دەرمان..." class="w-full p-4 border rounded-2xl bg-gray-50 text-lg font-bold">
                        <button onclick="processSale()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-black text-xl shadow-lg active:scale-95 transition">تۆمارکردنی فرۆشتن</button>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-3xl shadow-sm border">
                    <h2 class="font-bold mb-4 text-blue-800 flex justify-between items-center border-b pb-2">
                        <span><i class="fas fa-plus-circle ml-2"></i>داخڵکردنی دەرمان</span>
                        <button onclick="startScanner('stock')" class="text-blue-600 text-sm bg-blue-50 px-3 py-1 rounded-lg"><i class="fas fa-camera ml-1"></i>سکان</button>
                    </h2>
                    <div class="grid grid-cols-2 gap-3">
                        <input id="stBarcode" type="text" placeholder="بارکۆد" class="col-span-2 p-3 border rounded-xl bg-gray-50">
                        <input id="stName" type="text" placeholder="ناوی دەرمان" class="col-span-2 p-3 border rounded-xl">
                        <input id="stBuyPrice" type="number" placeholder="نرخی مەدخەل" class="p-3 border rounded-xl">
                        <input id="stSellPrice" type="number" placeholder="نرخی فرۆشتن" class="p-3 border rounded-xl">
                        <input id="stExpiry" type="date" class="col-span-2 p-3 border rounded-xl">
                        <button onclick="saveToStock()" class="col-span-2 bg-blue-600 text-white py-3 rounded-xl font-bold">پاشەکەوت کردن</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const PASSWORDS = { admin: "1998", staff: "2000" };
        let html5QrCode;
        let currentTarget = "";

        function handleLogin() {
            const role = document.getElementById('userRole').value;
            const pass = document.getElementById('passField').value;
            if(pass === PASSWORDS[role]) {
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('mainApp').classList.remove('hidden');
                if(role === 'admin') document.getElementById('adminStats').classList.remove('hidden');
            } else {
                alert("ڕەمزەکە هەڵەیە!");
            }
        }

        function startScanner(target) {
            currentTarget = target;
            document.getElementById('scannerModal').classList.remove('hidden');
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 },
                (decodedText) => {
                    if(currentTarget === 'sell') document.getElementById('sellBarcode').value = decodedText;
                    else document.getElementById('stBarcode').value = decodedText;
                    stopScanner();
                }
            ).catch(err => alert("کێشە لە کامێرا هەیە"));
        }

        function stopScanner() {
            if(html5QrCode) html5QrCode.stop().then(() => {
                document.getElementById('scannerModal').classList.add('hidden');
            });
        }

        function saveToStock() {
            // لێرە کۆدی پاشەکەوتکردن دەبێت
            alert("دەرمانەکە بە سەرکەوتوویی زیاد کرا بۆ کۆگا");
            document.getElementById('stName').value = "";
            document.getElementById('stBarcode').value = "";
        }

        function processSale() {
            const bc = document.getElementById('sellBarcode').value;
            if(!bc) return alert("تکایە بارکۆد سکان بکە");
            alert("فرۆشتنەکە تۆمار کرا: " + bc);
            document.getElementById('sellBarcode').value = "";
        }
    </script>
</body>
</html>
