<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ڕۆژیار - کۆگا و فرۆشتنی زیرەک</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans Arabic', sans-serif; background-color: #f8fafc; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-btn.active { background-color: white; color: #2563eb; }
    </style>
</head>
<body>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyArrrDsEpvnQhi3SFsEcQagVdlBbXMuqVE",
            authDomain: "rozhyar--pharmacy.firebaseapp.com",
            projectId: "rozhyar--pharmacy",
            storageBucket: "rozhyar--pharmacy.firebasestorage.app",
            messagingSenderId: "641814773252",
            appId: "1:641814773252:web:7a12ac6ded015ced5a7f51",
            measurementId: "G-2BL63CLH46"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
    </script>

    <div id="loginPage" class="fixed inset-0 bg-blue-900 flex items-center justify-center z-[100]">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-sm text-center mx-4">
            <h1 class="text-3xl font-black text-blue-600 mb-6">بەخێربێیت</h1>
            <input id="passField" type="password" placeholder="ڕەمزی نهێنی" class="w-full border-2 p-4 rounded-2xl text-center mb-4 outline-none font-bold text-lg bg-gray-50 focus:border-blue-500">
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black text-xl shadow-lg">چوونەژوورەوە</button>
        </div>
    </div>

    <div id="mainApp" class="hidden min-h-screen">
        <nav class="fixed bottom-0 left-0 right-0 bg-blue-600 text-white flex justify-around p-4 z-50 shadow-[0_-5px_20px_rgba(0,0,0,0.1)] rounded-t-[2rem]">
            <button onclick="switchTab('inventory')" id="btn-inventory" class="nav-btn active px-6 py-2 rounded-2xl font-bold transition-all flex flex-col items-center">
                <i class="fas fa-boxes mb-1"></i><span class="text-xs">کۆگا</span>
            </button>
            <button onclick="switchTab('report')" id="btn-report" class="nav-btn px-6 py-2 rounded-2xl font-bold transition-all flex flex-col items-center">
                <i class="fas fa-file-invoice-dollar mb-1"></i><span class="text-xs">فرۆشتن</span>
            </button>
        </nav>

        <header class="bg-white p-4 shadow-sm flex justify-between items-center sticky top-0 z-40">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white">
                    <i class="fas fa-pills"></i>
                </div>
                <span class="font-black text-blue-900">سەیدەلیەی ڕۆژیار</span>
            </div>
            <button onclick="location.reload()" class="text-red-500 font-bold text-sm">دەرچوون</button>
        </header>

        <div id="inventoryTab" class="tab-content active p-4 pb-32 max-w-2xl mx-auto space-y-4">
            
            <div id="scannerUI" class="hidden bg-black rounded-3xl overflow-hidden relative h-64 shadow-2xl mb-4 border-4 border-blue-500">
                <div id="reader" class="w-full"></div>
                <button onclick="stopScanner()" class="absolute top-2 right-2 bg-red-500 text-white p-2 rounded-full w-10 h-10"><i class="fas fa-times"></i></button>
            </div>

            <div class="flex gap-2">
                <button onclick="startScanner()" class="bg-blue-600 text-white p-4 rounded-2xl shadow-lg flex-1 font-black">
                    <i class="fas fa-camera ml-2"></i> سکان بکە
                </button>
                <input type="text" id="searchInput" onkeyup="searchMedicine()" placeholder="گەڕان..." class="w-2/3 p-4 rounded-2xl shadow-sm border-none outline-none font-bold text-right bg-white">
            </div>

            <div class="bg-white p-6 rounded-[2rem] shadow-sm border-2 border-blue-50">
                <h2 class="font-black text-blue-600 mb-4 flex items-center"><i class="fas fa-plus-circle ml-2"></i>زیادکردن بۆ کۆگا</h2>
                <div class="space-y-3">
                    <input id="mBarcode" type="text" placeholder="بارکۆدی دەرمان" class="w-full p-3 bg-gray-50 rounded-xl outline-none font-bold border focus:border-blue-400">
                    <input id="mName" type="text" placeholder="ناوی دەرمان" class="w-full p-3 bg-gray-50 rounded-xl outline-none font-bold border focus:border-blue-400">
                    <div class="grid grid-cols-2 gap-3">
                        <input id="mPrice" type="number" placeholder="نرخی فرۆشتن" class="p-3 bg-gray-50 rounded-xl outline-none font-bold border focus:border-blue-400">
                        <input id="mQty" type="number" placeholder="بڕ (شریت)" class="p-3 bg-gray-50 rounded-xl outline-none font-bold border focus:border-blue-400">
                    </div>
                    <button onclick="addMedicine()" id="addBtn" class="w-full bg-green-500 text-white py-4 rounded-2xl font-black shadow-md hover:bg-green-600 transition-all">تۆمارکردن</button>
                </div>
            </div>

            <div id="medicineList" class="space-y-3"></div>
        </div>

        <div id="reportTab" class="tab-content p-4 pb-32 max-w-2xl mx-auto space-y-4">
            <div class="bg-white p-6 rounded-[2rem] shadow-sm">
                <div id="salesSummary" class="text-center mb-6"></div>
                <div id="salesList" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <script>
        let allMedicines = [];
        let html5QrCode;

        function handleLogin() {
            if(document.getElementById('passField').value === "1998") {
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('mainApp').classList.remove('hidden');
                loadData();
            } else { alert("ڕەمزەکە هەڵەیە!"); }
        }

        function switchTab(t) {
            document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active'));
            document.getElementById(t + 'Tab').classList.add('active');
            document.getElementById('btn-' + t).classList.add('active');
            if(t === 'report') loadSales();
        }

        // --- SCANNER LOGIC ---
        function startScanner() {
            document.getElementById('scannerUI').classList.remove('hidden');
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, onScanSuccess);
        }

        function stopScanner() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => document.getElementById('scannerUI').classList.add('hidden'));
            }
        }

        function onScanSuccess(decodedText) {
            stopScanner();
            const item = allMedicines.find(m => m.barcode === decodedText);
            if(item) {
                sell(item.id, item.name, item.qty, item.price);
            } else {
                document.getElementById('mBarcode').value = decodedText;
                alert("ئەم بارکۆدە نوێیە، تکایە زانیارییەکان پڕ بکەرەوە.");
            }
        }

        // --- CORE DATABASE LOGIC ---
        async function addMedicine() {
            const b = document.getElementById('mBarcode').value, n = document.getElementById('mName').value;
            const p = parseFloat(document.getElementById('mPrice').value), q = parseInt(document.getElementById('mQty').value);
            if(!b || !n || isNaN(p) || isNaN(q)) return alert("تکایە هەموو خانەکان پڕ بکەرەوە");
            
            await db.collection("inventory").add({ barcode: b, name: n, price: p, qty: q, date: new Date() });
            document.querySelectorAll('input').forEach(i => i.id !== 'passField' ? i.value = "" : null);
        }

        function loadData() {
            db.collection("inventory").orderBy("name").onSnapshot(snap => {
                allMedicines = [];
                snap.forEach(doc => allMedicines.push({id: doc.id, ...doc.data()}));
                renderInventory(allMedicines);
            });
        }

        function renderInventory(data) {
            const div = document.getElementById('medicineList'); div.innerHTML = "";
            data.forEach(item => {
                const isLow = item.qty <= 3;
                div.innerHTML += `
                    <div class="bg-white p-5 rounded-3xl shadow-sm border-r-8 ${isLow ? 'border-red-500 animate-pulse' : 'border-blue-500'} flex justify-between items-center">
                        <div class="flex-1">
                            <div class="font-black text-slate-800 text-lg">${item.name}</div>
                            <div class="text-[10px] text-gray-400 font-bold">Code: ${item.barcode}</div>
                            <div class="flex gap-4 mt-1 text-sm font-bold">
                                <span class="${isLow ? 'text-red-600' : 'text-gray-500'}"><i class="fas fa-layer-group ml-1"></i>ماوە: ${item.qty}</span>
                                <span class="text-green-600"><i class="fas fa-tag ml-1"></i>${item.price.toLocaleString()} د.ع</span>
                            </div>
                        </div>
                        <button onclick="sell('${item.id}', '${item.name}', ${item.qty}, ${item.price})" class="bg-blue-600 text-white px-6 py-3 rounded-2xl font-black shadow-md active:scale-90 transition-all">Sale</button>
                    </div>`;
            });
        }

        async function sell(id, n, q, p) {
            if(q <= 0) return alert("ئەم دەرمانە لە کۆگا تەواو بووە!");
            if(confirm(`ئایا ${n} فرۆشرا؟`)) {
                await db.collection("inventory").doc(id).update({ qty: q - 1 });
                await db.collection("sales").add({ name: n, price: p, date: new Date() });
            }
        }

        function loadSales() {
            const listDiv = document.getElementById('salesList');
            const summaryDiv = document.getElementById('salesSummary');
            const today = new Date(); today.setHours(0,0,0,0);

            db.collection("sales").where("date", ">=", today).orderBy("date", "desc").onSnapshot(snap => {
                listDiv.innerHTML = "";
                let total = 0;
                snap.forEach(doc => {
                    const s = doc.data(); total += s.price;
                    listDiv.innerHTML += `
                        <div class="flex justify-between items-center bg-gray-50 p-4 rounded-2xl border-l-4 border-green-500">
                            <span class="font-bold text-slate-700">${s.name}</span>
                            <span class="font-black text-blue-600">${s.price.toLocaleString()} د.ع</span>
                        </div>`;
                });
                summaryDiv.innerHTML = `
                    <div class="bg-blue-600 text-white p-6 rounded-[2rem] shadow-xl">
                        <div class="text-sm opacity-80 mb-1 font-bold">کۆی گشتی فرۆشتنی ئەمڕۆ</div>
                        <div class="text-3xl font-black">${total.toLocaleString()} د.ع</div>
                    </div>`;
            });
        }

        function searchMedicine() {
            const t = document.getElementById('searchInput').value.toLowerCase();
            renderInventory(allMedicines.filter(m => m.name.toLowerCase().includes(t) || m.barcode.includes(t)));
        }
    </script>
</body>
</html>
