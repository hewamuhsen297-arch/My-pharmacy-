<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ڕۆژیار PRO v4.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700;900&display=swap');
        :root { --main-color: #2563eb; }
        body { font-family: 'Noto Sans Arabic', sans-serif; background-color: #f1f5f9; padding-bottom: 90px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-btn.active { color: var(--main-color); transform: scale(1.1); transition: 0.3s; }
        .bg-main { background-color: var(--main-color) !important; }
        .text-main { color: var(--main-color) !important; }
        .receipt-card { width: 80mm; background: white; padding: 10px; font-family: 'Courier New', Courier, monospace; color: black; }
        @media print {
            body * { visibility: hidden; }
            #receiptPrint, #receiptPrint * { visibility: visible; }
            #receiptPrint { position: absolute; left: 0; top: 0; width: 100%; border: none; }
        }
    </style>
</head>
<body>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyArrrDsEpvnQhi3SFsEcQagVdlBbXMuqVE",
            authDomain: "rozhyar--pharmacy.firebaseapp.com",
            projectId: "rozhyar--pharmacy",
            storageBucket: "rozhyar--pharmacy.firebasestorage.app",
            messagingSenderId: "641814773252",
            appId: "1:641814773252:web:7a12ac6ded015ced5a7f51"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
    </script>

    <div id="loginPage" class="fixed inset-0 bg-slate-900 flex items-center justify-center z-[100] px-4">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-sm text-center border-t-8 border-main">
            <div class="mb-6">
                <i class="fas fa-hand-holding-medical text-5xl text-main"></i>
                <h1 class="text-3xl font-black text-slate-800 mt-2">ڕۆژیار PRO</h1>
                <p class="text-gray-400 text-xs">بەڕێوەبردنی دەرمانخانە</p>
            </div>
            <input id="passField" type="password" placeholder="ڕەمزی چوونەژوورەوە" class="w-full border-2 p-4 rounded-2xl text-center mb-4 outline-none font-bold bg-gray-50 focus:border-main text-lg transition-all">
            <button onclick="handleLogin()" class="w-full bg-main text-white py-4 rounded-2xl font-black text-xl shadow-lg active:scale-95 transition-all">چوونەژوورەوە</button>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-4 z-50 rounded-t-[2.5rem] shadow-[0_-10px_25px_rgba(0,0,0,0.05)]">
            <button onclick="switchTab('inventory')" id="btn-inventory" class="nav-btn active flex flex-col items-center">
                <i class="fas fa-boxes-stacked text-2xl"></i><span class="text-[10px] font-black mt-1">کۆگا</span>
            </button>
            <button onclick="switchTab('sales')" id="btn-sales" class="nav-btn flex flex-col items-center text-gray-400">
                <i class="fas fa-cash-register text-2xl"></i><span class="text-[10px] font-black mt-1">فرۆشتن</span>
            </button>
            <button id="nav-report" onclick="switchTab('report')" class="nav-btn flex flex-col items-center text-gray-400">
                <i class="fas fa-chart-pie text-2xl"></i><span class="text-[10px] font-black mt-1">ڕاپۆرت</span>
            </button>
            <button id="nav-settings" onclick="switchTab('settings')" class="nav-btn flex flex-col items-center text-gray-400">
                <i class="fas fa-sliders text-2xl"></i><span class="text-[10px] font-black mt-1">سێتینگ</span>
            </button>
        </nav>

        <div id="inventoryTab" class="tab-content active p-4 max-w-2xl mx-auto space-y-4">
            <div class="bg-main flex justify-between items-center p-6 rounded-[2.5rem] text-white shadow-xl">
                <div>
                    <h2 class="font-black text-xl">کۆگای دەرمان</h2>
                    <p id="roleBadge" class="text-[10px] opacity-80 font-bold"></p>
                </div>
                <button onclick="startScanner('inv')" class="bg-white/20 p-4 rounded-2xl backdrop-blur-sm"><i class="fas fa-barcode text-xl"></i></button>
            </div>

            <div id="scannerUI" class="hidden rounded-[2.5rem] border-4 border-main overflow-hidden h-64 bg-black relative shadow-2xl">
                <div id="reader"></div>
                <button onclick="stopScanner()" class="absolute top-4 right-4 bg-red-600 text-white w-10 h-10 rounded-full z-10 font-black shadow-lg">X</button>
            </div>

            <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-gray-100 space-y-4">
                <div class="grid grid-cols-1 gap-3">
                    <input id="mBarcode" type="text" placeholder="بارکۆد سکان بکە یان بنووسە" class="w-full p-4 bg-gray-50 border rounded-2xl outline-none font-bold focus:ring-2 ring-main/20">
                    <input id="mName" type="text" placeholder="ناوی دەرمان" class="w-full p-4 bg-gray-50 border rounded-2xl outline-none font-bold">
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-blue-50/50 p-3 rounded-2xl">
                        <label class="text-[10px] font-black text-main block mb-1">نرخی کارتۆن (فرۆشتن)</label>
                        <input id="mPrice" type="number" class="w-full bg-transparent text-center font-black text-lg outline-none" placeholder="0">
                    </div>
                    <div class="bg-blue-50/50 p-3 rounded-2xl">
                        <label class="text-[10px] font-black text-main block mb-1">ژمارەی شیت لە کارتۆن</label>
                        <input id="mStrips" type="number" value="1" class="w-full bg-transparent text-center font-black text-lg outline-none">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-gray-50 p-3 rounded-2xl border">
                        <label class="text-[10px] font-black text-gray-400 block mb-1">بڕ (کارتۆن)</label>
                        <input id="mQty" type="number" class="w-full bg-transparent text-center font-black outline-none" placeholder="0">
                    </div>
                    <select id="mType" class="bg-gray-50 p-3 rounded-2xl border font-bold text-main outline-none">
                        <option value="تابلێت">Tablet</option><option value="کەپسول">Capsule</option>
                        <option value="شیر">Milk</option><option value="مەرهەم">Ointment</option>
                        <option value="بتڵ">Bottle</option><option value="ئەمپول">Ampule</option>
                    </select>
                </div>
                <button onclick="addMedicine()" class="w-full bg-main text-white py-5 rounded-[1.8rem] font-black text-lg shadow-lg hover:shadow-main/20 transition-all">تۆمارکردن لە کۆگا</button>
            </div>

            <div class="relative">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-300"></i>
                <input type="text" id="searchInput" onkeyup="searchMedicine('inv')" placeholder="بگەڕێ لە ناو دەرمانەکان..." class="w-full p-5 pl-12 rounded-[2rem] border-none shadow-sm outline-none font-bold text-right bg-white focus:ring-2 ring-main/10">
            </div>
            <div id="medicineList" class="space-y-3 pb-4"></div>
        </div>

        <div id="salesTab" class="tab-content p-4 max-w-2xl mx-auto space-y-4">
            <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-gray-100 space-y-4">
                <div class="flex gap-3">
                    <div class="relative flex-1">
                        <i class="fas fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-gray-300"></i>
                        <input type="text" id="salesSearchInput" onkeyup="searchMedicine('sales')" placeholder="ناوی دەرمان یان بارکۆد..." class="w-full p-5 pl-12 bg-gray-50 rounded-2xl outline-none text-right font-black focus:ring-2 ring-main/20">
                    </div>
                    <button onclick="startScanner('sales')" class="bg-main text-white px-6 rounded-2xl shadow-lg"><i class="fas fa-camera text-xl"></i></button>
                </div>
                <div id="salesSearchResults" class="space-y-2 max-h-60 overflow-y-auto custom-scrollbar"></div>
            </div>

            <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-gray-100 space-y-6">
                <div class="flex justify-between items-center border-b pb-4">
                    <h3 class="font-black text-slate-800 text-lg">سەبەتەی فرۆشتن</h3>
                    <button onclick="clearCart()" class="text-red-400 text-xs font-bold hover:text-red-600 transition-colors">پاککردنەوە</button>
                </div>
                
                <div id="cartList" class="space-y-3 min-h-[100px]"></div>
                
                <div class="bg-slate-50 p-5 rounded-[2rem] space-y-4 border border-slate-100">
                    <div class="flex gap-4 font-bold text-sm bg-white p-2 rounded-xl justify-center shadow-sm">
                        <label class="flex items-center gap-2 cursor-pointer p-2 rounded-lg hover:bg-blue-50 transition-colors">
                            <input type="radio" name="payType" value="cash" checked class="w-4 h-4 accent-main"> نەقد
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer p-2 rounded-lg hover:bg-red-50 transition-colors">
                            <input type="radio" name="payType" value="debt" class="w-4 h-4 accent-red-600"> قەرز
                        </label>
                    </div>
                    <input id="customerName" type="text" placeholder="ناوی کڕیار (بۆ حاڵەتی قەرز)" class="w-full p-4 bg-white border border-slate-200 rounded-xl outline-none font-bold focus:border-main">
                </div>

                <div class="flex justify-between items-center px-4 py-2">
                    <span class="font-black text-gray-400">کۆی گشتی:</span>
                    <div class="text-left">
                        <span id="cartTotal" class="font-black text-4xl text-main">0</span>
                        <span class="text-[10px] font-bold text-main mr-1">د.ع</span>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <button onclick="checkout(false)" class="bg-slate-700 text-white py-5 rounded-2xl font-black shadow-lg active:scale-95 transition-all flex flex-col items-center">
                        <i class="fas fa-check-double mb-1"></i>
                        <span class="text-sm">تەنها فرۆشتن</span>
                    </button>
                    <button onclick="checkout(true)" class="bg-main text-white py-5 rounded-2xl font-black shadow-lg active:scale-95 transition-all border-b-4 border-blue-800 flex flex-col items-center">
                        <i class="fas fa-print mb-1"></i>
                        <span class="text-sm">فرۆشتن و وەسڵ</span>
                    </button>
                </div>
            </div>
        </div>

        <div id="reportTab" class="tab-content p-4 max-w-2xl mx-auto space-y-4">
            <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-gray-100 flex gap-3 items-center">
                <i class="fas fa-calendar-day text-main text-xl"></i>
                <input type="date" id="reportDate" onchange="loadReport()" class="flex-1 p-2 outline-none font-black text-slate-700">
            </div>
            <div id="dailySummary" class="bg-slate-900 text-white p-8 rounded-[2.5rem] shadow-2xl relative overflow-hidden">
                <i class="fas fa-chart-line absolute -right-4 -bottom-4 text-8xl opacity-10 rotate-12"></i>
                <div id="summaryContent"></div>
            </div>
            <div id="allSalesList" class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-gray-100 space-y-3"></div>
        </div>

        <div id="settingsTab" class="tab-content p-4 max-w-2xl mx-auto space-y-4">
            <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-gray-100 text-center space-y-8">
                <div>
                    <h2 class="font-black text-2xl text-slate-800">ڕێکخستنی سیستم</h2>
                    <p class="text-gray-400 text-sm">گۆڕانکاری لە ڕەنگ و ڕەمزەکان</p>
                </div>

                <div class="space-y-4">
                    <p class="font-black text-slate-600 text-sm">ڕەنگی براند</p>
                    <div class="flex justify-center gap-4">
                        <button onclick="changeColor('#2563eb')" class="w-12 h-12 rounded-full bg-[#2563eb] border-4 border-white shadow-xl hover:scale-110 transition-transform"></button>
                        <button onclick="changeColor('#16a34a')" class="w-12 h-12 rounded-full bg-[#16a34a] border-4 border-white shadow-xl hover:scale-110 transition-transform"></button>
                        <button onclick="changeColor('#dc2626')" class="w-12 h-12 rounded-full bg-[#dc2626] border-4 border-white shadow-xl hover:scale-110 transition-transform"></button>
                        <button onclick="changeColor('#7c3aed')" class="w-12 h-12 rounded-full bg-[#7c3aed] border-4 border-white shadow-xl hover:scale-110 transition-transform"></button>
                    </div>
                </div>

                <div class="space-y-3 pt-6 border-t">
                    <input id="newAdminPass" type="text" placeholder="ڕەمزی نوێی ئەدمین" class="w-full p-4 bg-gray-50 border rounded-2xl outline-none font-bold focus:border-main">
                    <input id="newStaffPass" type="text" placeholder="ڕەمزی نوێی ستاف" class="w-full p-4 bg-gray-50 border rounded-2xl outline-none font-bold focus:border-main">
                    <button onclick="saveSettings()" class="w-full bg-slate-800 text-white py-4 rounded-2xl font-black shadow-lg">پاشەکەوتکردنی ڕەمزەکان</button>
                </div>

                <button onclick="location.reload()" class="w-full text-red-500 font-black py-4 rounded-2xl bg-red-50">دەرچوون لە ئەکاونت</button>
            </div>
        </div>
    </div>

    <div id="receiptPrint" class="hidden">
        <div class="receipt-card mx-auto">
            <div style="text-align: center; margin-bottom: 10px;">
                <h1 style="margin: 0; font-size: 20px; font-weight: 900;">سەیدەلیەی ڕۆژیار</h1>
                <p style="margin: 2px 0; font-size: 10px;">بەحرکە - جوت سایدی گشتی</p>
                <p style="margin: 2px 0; font-size: 9px;">بەرامبەر مزگەوتی مەلا ڕەشید</p>
                <div style="margin: 10px 0; border-top: 1px dashed #000;"></div>
                <p style="font-size: 10px; margin-bottom: 5px;"><span id="rDate"></span></p>
            </div>
            <div id="rItems" style="font-size: 12px; line-height: 1.6;"></div>
            <div style="margin: 10px 0; border-top: 1px dashed #000;"></div>
            <div style="display: flex; justify-content: space-between; font-weight: 900; font-size: 16px;">
                <span>کۆی گشتی:</span>
                <span><span id="rTotal"></span> د.ع</span>
            </div>
            <div style="text-align: center; margin-top: 15px; font-size: 10px;">
                <p>هیوای سەلامەتی بۆ کڕیار</p>
                <p style="margin-top: 5px;">*** سوپاس بۆ سەردانتان ***</p>
            </div>
        </div>
    </div>

    <script>
        let allMedicines = []; let cart = []; let html5QrCode;
        let adminPass = localStorage.getItem('adminPass') || "1998";
        let staffPass = localStorage.getItem('staffPass') || "1111";
        let mainColor = localStorage.getItem('mainColor') || "#2563eb";
        let userRole = "";

        function applyTheme() { document.documentElement.style.setProperty('--main-color', mainColor); }
        applyTheme();

        function handleLogin() {
            const p = document.getElementById('passField').value;
            if(p === adminPass) startApp("admin");
            else if(p === staffPass) startApp("staff");
            else alert("ڕەمز هەڵەیە! (Admin: 1998, Staff: 1111)");
        }

        function startApp(role) {
            userRole = role;
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('roleBadge').innerText = role === "admin" ? "دەسەڵاتی تەواو (Admin)" : "بەشی فرۆشتن (Staff)";
            if(role === "staff") {
                document.getElementById('nav-report').remove();
                document.getElementById('nav-settings').remove();
            }
            document.getElementById('reportDate').valueAsDate = new Date();
            loadData();
        }

        function switchTab(t) {
            document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(x => { x.classList.add('text-gray-400'); x.classList.remove('active'); });
            document.getElementById(t + 'Tab').classList.add('active');
            const btn = document.getElementById('btn-' + t);
            if(btn) { btn.classList.add('active'); btn.classList.remove('text-gray-400'); }
            stopScanner();
            if(t === 'report') loadReport();
        }

        // --- SCANNER ---
        function startScanner(target) {
            document.getElementById('scannerUI').classList.remove('hidden');
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (text) => {
                stopScanner();
                const item = allMedicines.find(m => m.barcode === text);
                if(item) {
                    if(target === 'sales') { addToCart(item.id, item.name, item.price, item.qty, item.strips); switchTab('sales'); }
                    else document.getElementById('mBarcode').value = text;
                } else {
                    if(target === 'inv') document.getElementById('mBarcode').value = text;
                    else alert("بارکۆدەکە بوونی نییە!");
                }
            });
        }
        function stopScanner() { if(html5QrCode) html5QrCode.stop().then(()=>document.getElementById('scannerUI').classList.add('hidden')).catch(e=>{}); }

        // --- CORE FUNCTIONS ---
        async function addMedicine() {
            const b = document.getElementById('mBarcode').value, n = document.getElementById('mName').value;
            const p = parseFloat(document.getElementById('mPrice').value), q = parseFloat(document.getElementById('mQty').value);
            const s = parseInt(document.getElementById('mStrips').value) || 1;
            if(!n || !p || isNaN(q)) return alert("تکایە خانەکان پڕبکەرەوە");
            await db.collection("inventory").add({ barcode: b, name: n, price: p, qty: q, strips: s, type: document.getElementById('mType').value });
            document.querySelectorAll('#inventoryTab input').forEach(i => { if(i.id !== 'mStrips') i.value = "" });
            alert("تۆمارکرا ✅");
        }

        function loadData() {
            db.collection("inventory").orderBy("name").onSnapshot(snap => {
                allMedicines = []; snap.forEach(doc => allMedicines.push({id: doc.id, ...doc.data()}));
                renderInventory(allMedicines);
            });
        }

        function renderInventory(data) {
            const div = document.getElementById('medicineList'); div.innerHTML = "";
            data.forEach(item => {
                const totalStrips = (item.qty * item.strips).toFixed(1);
                div.innerHTML += `
                    <div class="bg-white p-5 rounded-[1.8rem] shadow-sm border-r-8 ${item.qty <= 2 ? 'border-red-500':'border-main'} flex justify-between items-center animate-in fade-in slide-in-from-right-4 transition-all">
                        <div class="flex-1">
                            <div class="font-black text-slate-800 text-lg">${item.name} <span class="text-[9px] bg-slate-100 px-2 py-1 rounded-full text-slate-400 mr-1">${item.type}</span></div>
                            <div class="flex gap-3 mt-1">
                                <span class="text-[11px] font-bold text-gray-500"><i class="fas fa-archive ml-1"></i>${item.qty.toFixed(1)} کارتۆن</span>
                                <span class="text-[11px] font-bold text-gray-500"><i class="fas fa-layer-group ml-1"></i>${totalStrips} شیت</span>
                            </div>
                            <div class="text-main font-black mt-1 text-sm">${item.price.toLocaleString()} د.ع</div>
                        </div>
                        <div class="flex items-center gap-1">
                            <button onclick="addToCart('${item.id}','${item.name}',${item.price},${item.qty},${item.strips})" class="bg-main text-white p-4 rounded-2xl shadow-lg active:scale-90 transition-all"><i class="fas fa-cart-plus text-lg"></i></button>
                            ${userRole === 'admin' ? `<button onclick="deleteMedicine('${item.id}')" class="text-red-200 p-2 hover:text-red-500"><i class="fas fa-trash-can"></i></button>` : ''}
                        </div>
                    </div>`;
            });
        }

        async function deleteMedicine(id) { if(confirm("ئایە دڵنیای لە سڕینەوە؟")) await db.collection("inventory").doc(id).delete(); }

        function addToCart(id, name, price, stock, stripsPerBox) {
            if(stock <= 0) return alert("لە کۆگا تەواو بووە!");
            const stripPrice = Math.round(price / stripsPerBox);
            cart.push({ id, name, boxPrice: price, stripPrice: stripPrice, mode: 'box', stripsPerBox });
            updateCartUI();
        }

        function updateCartUI() {
            const div = document.getElementById('cartList'); div.innerHTML = ""; let total = 0;
            cart.forEach((item, idx) => {
                const currentPrice = item.mode === 'box' ? item.boxPrice : item.stripPrice;
                total += currentPrice;
                div.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm flex flex-col gap-3">
                        <div class="flex justify-between font-black text-slate-800">
                            <span>${item.name}</span>
                            <button onclick="removeFromCart(${idx})" class="text-red-400 p-1"><i class="fas fa-circle-xmark"></i></button>
                        </div>
                        <div class="flex justify-between items-center">
                            <div class="flex bg-slate-100 p-1 rounded-xl text-[10px] font-black">
                                <button onclick="setMode(${idx}, 'box')" class="px-4 py-2 rounded-lg ${item.mode==='box'?'bg-white shadow-sm text-main':'text-gray-400'}">کارتۆن</button>
                                <button onclick="setMode(${idx}, 'strip')" class="px-4 py-2 rounded-lg ${item.mode==='strip'?'bg-white shadow-sm text-main':'text-gray-400'}">شیت</button>
                            </div>
                            <span class="font-black text-slate-800">${currentPrice.toLocaleString()} <small class="text-[9px] text-gray-400">د.ع</small></span>
                        </div>
                    </div>`;
            });
            document.getElementById('cartTotal').innerText = total.toLocaleString();
        }

        function setMode(idx, mode) { cart[idx].mode = mode; updateCartUI(); }
        function removeFromCart(idx) { cart.splice(idx, 1); updateCartUI(); }
        function clearCart() { cart = []; updateCartUI(); }

        async function checkout(shouldPrint) {
            if(cart.length === 0) return;
            const now = new Date(); const dateStr = now.toLocaleDateString('en-CA');
            const payType = document.querySelector('input[name="payType"]:checked').value;
            const customer = document.getElementById('customerName').value || "نەقد";
            let total = 0; let receiptHtml = "";

            for(let item of cart) {
                const currentPrice = item.mode === 'box' ? item.boxPrice : item.stripPrice;
                total += currentPrice;
                receiptHtml += `
                    <div style="display:flex; justify-content:space-between; margin-bottom:4px">
                        <span style="flex:1">${item.name} (${item.mode === 'box' ? 'ک' : 'ش'})</span>
                        <span style="min-width:60px; text-align:left">${currentPrice.toLocaleString()}</span>
                    </div>`;
                
                const ref = db.collection("inventory").doc(item.id);
                const doc = await ref.get();
                const reduction = item.mode === 'box' ? 1 : (1 / item.stripsPerBox);
                await ref.update({ qty: doc.data().qty - reduction });

                await db.collection("sales").add({ 
                    name: item.name, price: currentPrice, dateStr, 
                    type: payType, customer: customer, timestamp: now, seller: userRole 
                });
            }

            if(shouldPrint) {
                document.getElementById('rDate').innerText = now.toLocaleString('ku-IQ');
                document.getElementById('rItems').innerHTML = receiptHtml;
                document.getElementById('rTotal').innerText = total.toLocaleString();
                window.print();
            }

            cart = []; updateCartUI();
            document.getElementById('customerName').value = "";
            alert(shouldPrint ? "وەسڵەکە چاپکرا ✅" : "فرۆشتنەکە تۆمارکرا ✅");
        }

        function searchMedicine(target) {
            const inputId = target === 'inv' ? 'searchInput' : 'salesSearchInput';
            const t = document.getElementById(inputId).value.toLowerCase();
            const filtered = allMedicines.filter(m => m.name.toLowerCase().includes(t) || m.barcode.includes(t));
            
            if(target === 'inv') renderInventory(filtered);
            else {
                const res = document.getElementById('salesSearchResults'); res.innerHTML = "";
                if(t) filtered.forEach(item => {
                    res.innerHTML += `
                        <div onclick="addToCart('${item.id}','${item.name}',${item.price},${item.qty},${item.strips}); document.getElementById('salesSearchInput').value='';" 
                             class="p-4 bg-white border border-slate-100 rounded-2xl flex justify-between items-center cursor-pointer hover:border-main transition-all shadow-sm">
                            <span class="font-black text-slate-700">${item.name} <small class="text-gray-400 font-bold ml-2">(${item.qty.toFixed(1)} ک)</small></span>
                            <span class="text-main font-black">${item.price.toLocaleString()}</span>
                        </div>`;
                });
            }
        }

        function loadReport() {
            const date = document.getElementById('reportDate').value;
            db.collection("sales").where("dateStr", "==", date).get().then(snap => {
                let cash = 0, debt = 0, listHtml = "";
                snap.forEach(doc => { 
                    const s = doc.data(); if(s.type === 'cash') cash += s.price; else debt += s.price;
                    listHtml += `
                        <div class="flex justify-between items-center border-b border-slate-50 py-3">
                            <div><div class="font-black text-slate-700 text-sm">${s.name}</div><div class="text-[9px] text-gray-400">${s.customer} | ${s.seller || 'ستاف'}</div></div>
                            <div class="font-black ${s.type==='debt'?'text-red-500':'text-green-600'} text-sm">${s.price.toLocaleString()}</div>
                        </div>`;
                });
                document.getElementById('summaryContent').innerHTML = `
                    <div class="grid grid-cols-2 gap-4 mb-6">
                        <div><p class="text-[10px] opacity-60">کۆی نەقد</p><p class="text-xl font-black">${cash.toLocaleString()}</p></div>
                        <div><p class="text-[10px] opacity-60">کۆی قەرز</p><p class="text-xl font-black">${debt.toLocaleString()}</p></div>
                    </div>
                    <div class="pt-4 border-t border-white/10"><p class="text-[10px] opacity-60">کۆی گشتی داهاتی ڕۆژ</p><p class="text-4xl font-black">${(cash+debt).toLocaleString()} <small class="text-sm">د.ع</small></p></div>`;
                document.getElementById('allSalesList').innerHTML = listHtml || "<p class='text-center text-gray-400 py-4 font-bold'>هیچ فرۆشتنێک نەکراوە</p>";
            });
        }

        function saveSettings() {
            const nap = document.getElementById('newAdminPass').value;
            const nsp = document.getElementById('newStaffPass').value;
            if(nap) { adminPass = nap; localStorage.setItem('adminPass', nap); }
            if(nsp) { staffPass = nsp; localStorage.setItem('staffPass', nsp); }
            alert("ڕەمزەکان گۆڕدران ✅");
        }

        function changeColor(c) { 
            mainColor = c; applyTheme(); localStorage.setItem('mainColor', c); 
            alert("ڕەنگی سیستم گۆڕدرا، لاپەڕەکە نوێ دەبێتەوە");
            location.reload(); 
        }
    </script>
</body>
</html>
