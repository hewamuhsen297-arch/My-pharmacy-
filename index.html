<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ڕۆژیار - وەشانی پرێنت و جۆرەکان</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans Arabic', sans-serif; background-color: #f1f5f9; padding-bottom: 80px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-btn.active { color: #2563eb; transform: translateY(-5px); }
        @media print {
            body * { visibility: hidden; }
            #receiptPrint, #receiptPrint * { visibility: visible; }
            #receiptPrint { position: absolute; left: 0; top: 0; width: 100%; text-align: center; }
        }
    </style>
</head>
<body>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyArrrDsEpvnQhi3SFsEcQagVdlBbXMuqVE",
            authDomain: "rozhyar--pharmacy.firebaseapp.com",
            projectId: "rozhyar--pharmacy",
            storageBucket: "rozhyar--pharmacy.firebasestorage.app",
            messagingSenderId: "641814773252",
            appId: "1:641814773252:web:7a12ac6ded015ced5a7f51",
            measurementId: "G-2BL63CLH46"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
    </script>

    <div id="loginPage" class="fixed inset-0 bg-slate-900 flex items-center justify-center z-[100]">
        <div class="bg-white p-8 rounded-[2rem] shadow-2xl w-full max-w-sm text-center mx-4 border-t-8 border-blue-600">
            <h1 class="text-3xl font-black text-blue-600 mb-6">ڕۆژیار PRO</h1>
            <input id="passField" type="password" placeholder="ڕەمز" class="w-full border-2 p-4 rounded-2xl text-center mb-4 outline-none font-bold bg-gray-50 focus:border-blue-600">
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black text-xl">چوونەژوورەوە</button>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-3 z-50 rounded-t-3xl shadow-xl">
            <button onclick="switchTab('inventory')" id="btn-inventory" class="nav-btn active flex flex-col items-center transition-all">
                <i class="fas fa-warehouse text-xl"></i><span class="text-[10px] font-bold">کۆگا</span>
            </button>
            <button onclick="switchTab('sales')" id="btn-sales" class="nav-btn flex flex-col items-center transition-all text-gray-400">
                <i class="fas fa-shopping-cart text-xl"></i><span class="text-[10px] font-bold">فرۆشتن</span>
            </button>
            <button onclick="switchTab('report')" id="btn-report" class="nav-btn flex flex-col items-center transition-all text-gray-400">
                <i class="fas fa-chart-bar text-xl"></i><span class="text-[10px] font-bold">ڕاپۆرت</span>
            </button>
        </nav>

        <div id="inventoryTab" class="tab-content active p-4 max-w-2xl mx-auto space-y-4">
            <div class="bg-blue-600 text-white p-6 rounded-3xl shadow-lg flex justify-between items-center">
                <h2 class="font-black text-xl">بەشی کۆگا</h2>
                <button onclick="startScanner()" class="bg-white text-blue-600 p-3 rounded-2xl"><i class="fas fa-barcode"></i></button>
            </div>

            <div id="scannerUI" class="hidden rounded-3xl overflow-hidden border-4 border-blue-500 shadow-2xl relative h-60">
                <div id="reader"></div>
                <button onclick="stopScanner()" class="absolute top-2 right-2 bg-red-500 text-white w-8 h-8 rounded-full">X</button>
            </div>

            <div class="bg-white p-6 rounded-3xl shadow-sm border space-y-3">
                <input id="mBarcode" type="text" placeholder="بارکۆدی دەرمان" class="w-full p-3 bg-gray-50 rounded-xl border outline-none font-bold">
                <input id="mName" type="text" placeholder="ناوی دەرمان" class="w-full p-3 bg-gray-50 rounded-xl border outline-none font-bold">
                
                <select id="mType" class="w-full p-3 bg-gray-50 rounded-xl border outline-none font-bold text-blue-600">
                    <option value="تابلێت">تابلێت (Tablet)</option>
                    <option value="کەپسول">کەپسول (Capsule)</option>
                    <option value="مەرهەم">مەرهەم (Ointment)</option>
                    <option value="سۆفت جێل">سۆفت جێل (Softgel)</option>
                    <option value="بتڵ">بتڵ (Bottle)</option>
                    <option value="ئینهالەیەر">ئینهالەیەر (Inhaler)</option>
                    <option value="ئامپول">ئامپول (Ampoule)</option>
                    <option value="ڤیەل">ڤیەل (Vial)</option>
                </select>

                <div class="grid grid-cols-2 gap-3">
                    <input id="mPrice" type="number" placeholder="نرخ" class="p-3 bg-gray-50 rounded-xl border outline-none font-bold">
                    <input id="mQty" type="number" placeholder="بڕ" class="p-3 bg-gray-50 rounded-xl border outline-none font-bold">
                </div>
                <button onclick="addMedicine()" class="w-full bg-green-500 text-white py-4 rounded-2xl font-black">تۆمارکردن لە کۆگا</button>
            </div>

            <input type="text" id="searchInput" onkeyup="searchMedicine()" placeholder="بگەڕێ..." class="w-full p-4 rounded-2xl shadow-sm border outline-none font-bold text-right">
            <div id="medicineList" class="space-y-3"></div>
        </div>

        <div id="salesTab" class="tab-content p-4 max-w-2xl mx-auto space-y-4">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-blue-200">
                <h2 class="font-black text-blue-600 mb-4 flex items-center"><i class="fas fa-shopping-basket ml-2"></i>فرۆشتنی ئێستا</h2>
                <div id="cartList" class="space-y-2 mb-4 min-h-[100px]"></div>
                <div class="border-t pt-4 flex justify-between items-center mb-4">
                    <span class="font-black text-lg">کۆی گشتی:</span>
                    <span id="cartTotal" class="font-black text-2xl text-blue-600">0</span>
                </div>
                <button onclick="checkout()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black shadow-lg mb-2">تەواوکردنی فرۆشتن و پسوولە</button>
                <button onclick="clearCart()" class="w-full bg-red-100 text-red-500 py-2 rounded-2xl font-bold">بەتاڵکردنەوە</button>
            </div>
        </div>

        <div id="reportTab" class="tab-content p-4 max-w-2xl mx-auto space-y-4 text-center">
            <div id="dailySummary" class="bg-blue-600 text-white p-8 rounded-3xl shadow-xl"></div>
            <div id="allSalesList" class="space-y-2 text-right"></div>
        </div>
    </div>

    <div id="receiptPrint" class="hidden">
        <h2 style="font-size: 20px; font-weight: bold;">سەیدەلیەی ڕۆژیار</h2>
        <p>بەروار: <span id="rDate"></span></p>
        <hr>
        <div id="rItems" style="margin: 10px 0;"></div>
        <hr>
        <h3>کۆی گشتی: <span id="rTotal"></span> د.ع</h3>
        <p>هیوای سەلامەتی بۆ هەمووان</p>
    </div>

    <script>
        let allMedicines = [];
        let cart = [];
        let html5QrCode;

        function handleLogin() {
            if(document.getElementById('passField').value === "1998") {
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('mainApp').classList.remove('hidden');
                loadData();
            } else { alert("هەڵەیە!"); }
        }

        function switchTab(t) {
            document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(x => x.classList.add('text-gray-400'));
            document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active'));
            
            document.getElementById(t + 'Tab').classList.add('active');
            document.getElementById('btn-' + t).classList.add('active');
            document.getElementById('btn-' + t).classList.remove('text-gray-400');
            
            if(t === 'report') loadReport();
        }

        // --- SCANNER ---
        function startScanner() {
            document.getElementById('scannerUI').classList.remove('hidden');
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 200 }, (text) => {
                stopScanner();
                const item = allMedicines.find(m => m.barcode === text);
                if(item) { addToCart(item.id, item.name, item.price, item.qty); } 
                else { document.getElementById('mBarcode').value = text; alert("نوێیە، زانیاری پڕبکەرەوە"); }
            });
        }

        function stopScanner() { if(html5QrCode) html5QrCode.stop().then(()=>document.getElementById('scannerUI').classList.add('hidden')); }

        // --- CORE ---
        async function addMedicine() {
            const b = document.getElementById('mBarcode').value, n = document.getElementById('mName').value;
            const t = document.getElementById('mType').value, p = parseFloat(document.getElementById('mPrice').value), q = parseInt(document.getElementById('mQty').value);
            if(!b || !n || !p) return alert("خانەکان پڕبکەرەوە");
            await db.collection("inventory").add({ barcode: b, name: n, type: t, price: p, qty: q });
            alert("تۆمارکرا");
        }

        function loadData() {
            db.collection("inventory").orderBy("name").onSnapshot(snap => {
                allMedicines = [];
                snap.forEach(doc => allMedicines.push({id: doc.id, ...doc.data()}));
                renderInventory(allMedicines);
            });
        }

        function renderInventory(data) {
            const div = document.getElementById('medicineList'); div.innerHTML = "";
            data.forEach(item => {
                div.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl shadow-sm border-r-4 border-blue-500 flex justify-between items-center">
                        <div>
                            <div class="font-black">${item.name} <span class="text-xs text-blue-500">(${item.type})</span></div>
                            <div class="text-xs font-bold text-gray-500">ماوە: ${item.qty} | نرخ: ${item.price.toLocaleString()}</div>
                        </div>
                        <button onclick="addToCart('${item.id}', '${item.name}', ${item.price}, ${item.qty})" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-xs font-bold font-black">+ Sell</button>
                    </div>`;
            });
        }

        // --- CART SYSTEM ---
        function addToCart(id, name, price, stock) {
            if(stock <= 0) return alert("لە کۆگا نەماوە!");
            cart.push({id, name, price});
            updateCartUI();
            switchTab('sales');
        }

        function updateCartUI() {
            const div = document.getElementById('cartList'); div.innerHTML = "";
            let total = 0;
            cart.forEach((item, index) => {
                total += item.price;
                div.innerHTML += `<div class="flex justify-between bg-gray-50 p-3 rounded-xl border">
                    <span class="font-bold">${item.name}</span>
                    <span class="font-black text-blue-600">${item.price.toLocaleString()}</span>
                </div>`;
            });
            document.getElementById('cartTotal').innerText = total.toLocaleString();
        }

        function clearCart() { cart = []; updateCartUI(); }

        async function checkout() {
            if(cart.length === 0) return;
            let total = 0;
            let receiptHtml = "";
            
            for(let item of cart) {
                total += item.price;
                receiptHtml += `<div>${item.name} ........... ${item.price.toLocaleString()}</div>`;
                // کەمکردنەوە لە کۆگا
                const ref = db.collection("inventory").doc(item.id);
                const doc = await ref.get();
                await ref.update({ qty: doc.data().qty - 1 });
                // تۆمارکردن لە فرۆشتن
                await db.collection("sales").add({ name: item.name, price: item.price, date: new Date() });
            }

            // ئامادەکاری بۆ پرێنت
            document.getElementById('rDate').innerText = new Date().toLocaleString();
            document.getElementById('rItems').innerHTML = receiptHtml;
            document.getElementById('rTotal').innerText = total.toLocaleString();
            
            window.print();
            clearCart();
            alert("فرۆشتن سەرکەوتوو بوو!");
        }

        function loadReport() {
            const summary = document.getElementById('dailySummary');
            const list = document.getElementById('allSalesList');
            const today = new Date(); today.setHours(0,0,0,0);

            db.collection("sales").where("date", ">=", today).get().then(snap => {
                let total = 0;
                list.innerHTML = "<h3 class='font-black mb-2 border-b pb-2'>فرۆشتنەکانی ئەمڕۆ</h3>";
                snap.forEach(doc => {
                    const s = doc.data(); total += s.price;
                    list.innerHTML += `<div class='flex justify-between text-sm bg-white p-2 rounded-lg mb-1'><span>${s.name}</span><span>${s.price}</span></div>`;
                });
                summary.innerHTML = `<div class='text-sm opacity-80'>کۆی گشتی ئەمڕۆ</div><div class='text-4xl font-black'>${total.toLocaleString()}</div><div class='text-xs mt-2'>دیناری عێراقی</div>`;
            });
        }

        function searchMedicine() {
            const t = document.getElementById('searchInput').value.toLowerCase();
            renderInventory(allMedicines.filter(m => m.name.toLowerCase().includes(t) || m.barcode.includes(t)));
        }
    </script>
</body>
</html>
